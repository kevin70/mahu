[versions]
ebean = "17.2.0"
helidon = "4.3.2"
mapstruct = "1.6.3"
fastexcel = "0.19.0"
log4j = "2.25.3"
avaje-validator = "2.16"
jackson = "2.20.0"

junit = "6.0.1"

[libraries]
jspecify = { module = "org.jspecify:jspecify", version = "1.0.0" }
checker-qual = { module = "org.checkerframework:checker-qual", version = "3.49.5" }
error_prone_annotations = { module = "com.google.errorprone:error_prone_annotations", version = { strictly = "2.43.0" } }
lombok = { module = "org.projectlombok:lombok", version = "1.18.42" }
guava = { module = "com.google.guava:guava", version = "33.4.8-jre" }
caffeine = { module = "com.github.ben-manes.caffeine:caffeine", version = "3.2.3" }
postgresql = { module = "org.postgresql:postgresql", version = "42.7.8" }
valkey-glide = { module = "io.valkey:valkey-glide", version = "2.2.5" }
commons-collections4 = { module = "org.apache.commons:commons-collections4", version = "4.5.0" }
commons-text = { module = "org.apache.commons:commons-text", version = "1.14.0" }
commons-compress = { module = "org.apache.commons:commons-compress", version = "3.2.0" }
roaringbitmap = { module = "com.github.RoaringBitmap.RoaringBitmap:roaringbitmap", version = "1.6.0" }
db-scheduler = { module = "com.github.kagkarlsson:db-scheduler", version = "16.0.0" }
ulid-creator = { module = "com.github.f4b6a3:ulid-creator", version = "5.2.3" }
minio = { module = "io.minio:minio", version = "8.6.0" }
password4j = { module = "com.password4j:password4j", version = "1.8.4" }

assert-core = { module = "org.assertj:assertj-core", version = "3.27.6" }
