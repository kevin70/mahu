instancio-junit = { module = "org.instancio:instancio-junit", version = "5.5.1" }
mockito-junit-jupiter = { module = "org.mockito:mockito-junit-jupiter", version = "5.21.0" }

mapstruct = { module = "org.mapstruct:mapstruct", version.ref = "mapstruct" }
mapstruct-processor = { module = "org.mapstruct:mapstruct-processor", version.ref = "mapstruct" }

jackson-databind = { module = "com.fasterxml.jackson.core:jackson-databind", version.ref = "jackson" }
jackson-module-parameter-names = { module = "com.fasterxml.jackson.module:jackson-module-parameter-names", version.ref = "jackson" }
jackson-module-afterburner = { module = "com.fasterxml.jackson.module:jackson-module-afterburner", version.ref = "jackson" }
jackson-datatype-jdk8 = { module = "com.fasterxml.jackson.datatype:jackson-datatype-jdk8", version.ref = "jackson" }
jackson-datatype-jsr310 = { module = "com.fasterxml.jackson.datatype:jackson-datatype-jsr310", version.ref = "jackson" }
jackson-datatype-guava = { module = "com.fasterxml.jackson.datatype:jackson-datatype-guava", version.ref = "jackson" }

ebean-querybean-generator = { module = "io.ebean:querybean-generator", version.ref = "ebean" }
ebean-api = { module = "io.ebean:ebean-api", version.ref = "ebean" }
ebean-core = { module = "io.ebean:ebean-core", version.ref = "ebean" }
ebean-querybean = { module = "io.ebean:ebean-querybean", version.ref = "ebean" }
ebean-postgres = { module = "io.ebean:ebean-postgres", version.ref = "ebean" }
ebean-jackson-mapper = { module = "io.ebean:ebean-jackson-mapper", version.ref = "ebean" }

helidon-bundles-apt = { module = "io.helidon.bundles:helidon-bundles-apt", version.ref = "helidon" }
helidon-common-context = { module = "io.helidon.common:helidon-common-context", version.ref = "helidon" }
helidon-common-parameters = { module = "io.helidon.common:helidon-common-parameters", version.ref = "helidon" }
helidon-common-configurable = { module = "io.helidon.common:helidon-common-configurable", version.ref = "helidon" }
helidon-config-yaml = { module = "io.helidon.config:helidon-config-yaml", version.ref = "helidon" }
