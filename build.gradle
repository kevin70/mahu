plugins {
    id("java")
    id("application")
    id("io.avaje.inject") version("11.1")
    id("io.ebean") version("15.12.0")
    id("org.openapi.generator") version("7.13.0")

    id("checkstyle")
    id("project-report")
    id("name.remal.sonarlint") version("6.0.0-rc-2")
    id("com.palantir.java-format") version("2.66.0")

    id("org.hidetake.ssh") version "2.11.2"
    id("com.bmuschko.docker-remote-api") version("9.4.0")
    id("com.github.node-gradle.node") version("7.1.0")
    id("com.github.johnrengelman.shadow") version("8.1.1") apply(false)
    id("org.graalvm.buildtools.native") version("0.10.6")
}

allprojects {

    apply plugin: "java"
    apply plugin: "checkstyle"
    apply plugin: "name.remal.sonarlint"
    apply plugin: "com.palantir.java-format"
    apply plugin: "com.github.node-gradle.node"

    group = "cool.houge.mahu"
    version = "1.0.0-SNAPSHOT"

    java {
        sourceCompatibility = JavaVersion.VERSION_23
        targetCompatibility = JavaVersion.VERSION_23
    }

    tasks.withType(JavaCompile).configureEach {
        options.encoding = "UTF-8"
        options.compilerArgs += [
            "-parameters",
            "-Amapstruct.defaultComponentModel=jakarta",
            "-Amapstruct.unmappedTargetPolicy=IGNORE",
            "-Amapstruct.unmappedSourcePolicy=IGNORE"
        ]
        options.sourcepath = sourceSets.main.resources.getSourceDirectories()
    }

    test {
        useJUnitPlatform()
    }

    sonarLint {
        languages {
            include("java")
        }
        testSourceSets = sourceSets.matching { true }
    }

    configurations {
        configureEach {
            exclude group: "io.avaje", module: "avaje-config"
        }
    }

    remotes {
        hx01 {
            host = "ec-api.crosshealth.club"
            user = "root"
            identity = file("${System.getProperty("user.home")}/.ssh/id_rsa")
            knownHosts = allowAnyHosts
        }
    }

    node {
        download = true
        version = "22.3.0"
        distBaseUrl = "https://mirrors.huaweicloud.com/nodejs/"
    }

    dependencies {
        annotationProcessor("org.projectlombok:lombok:$lombokVersion")
        compileOnly("org.projectlombok:lombok:$lombokVersion")
        compileOnly("org.mapstruct:mapstruct:$mapstructVersion")
        compileOnly("io.swagger.core.v3:swagger-annotations:$swaggerVersion")

        testCompileOnly("org.projectlombok:lombok:$lombokVersion")
        testAnnotationProcessor("org.projectlombok:lombok:$lombokVersion")
        testAnnotationProcessor("io.avaje:avaje-inject-generator:$avajeInjectVersion")
        testImplementation("org.assertj:assertj-core:$assertjVersion")
        testImplementation("org.junit.jupiter:junit-jupiter-params:$junitVersion")
        testImplementation("org.junit-pioneer:junit-pioneer:2.3.0")
        testImplementation("io.avaje:avaje-inject-test:$avajeInjectVersion")
        testImplementation("org.instancio:instancio-junit:$instancioVersion")
    }

    repositories {
        maven { url "https://repo.huaweicloud.com/repository/maven" }
        maven { url "https://jitpack.io" }
        mavenLocal()
        mavenCentral()
    }
}

htmlDependencyReport {
    projects = project.allprojects
}

//noinspection UnnecessaryQualifiedReference
tasks.register("buildDashboardUI", com.github.gradle.node.pnpm.task.PnpmTask.class) {
    group("build")
    doFirst {
        // 清理之前生成的资源
        project.delete("${projectDir}/mahu-admin-ui/dist")
    }

    workingDir = file("${projectDir}/mahu-admin-ui")
    pnpmCommand = ["pnpm", "build"]
}

tasks.register("tarAdminUI", Tar.class) {
    group("distribution")
    dependsOn("buildAdminUI")

    archiveFileName = "mahu-dashboard-ui.tar.gz"
    destinationDirectory = file("$projectDir/mahu-dashboard-ui")
    compression = Compression.GZIP
    from file("$projectDir/mahu-dashboard-ui/dist/")
}

tasks.register("deployAdminUI") {
    group("distribution")
    dependsOn("tarAdminUI")

    doLast {
        ssh.run {
            session(remotes.hx01) {
                put(from: "${projectDir}/mahu-dashboard-ui/mahu-dashboard-ui.tar.gz", into: "/root/nginx/html/mahu-dashboard-ui.tar.gz")
                execute([
                    "source ~/.profile",
                    "cd /root/nginx/html",
                    "mkdir -p mahu-dashboard-ui",
                    "tar -zxvf mahu-dashboard-ui.tar.gz -C mahu-dashboard-ui",
                    /* 清理资源 */
                    "rm -rf mahu-dashboard-ui.tar.gz",
                ].join('\n'))
            }
        }
    }
}
