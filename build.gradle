//file:noinspection UnnecessaryQualifiedReference
plugins {
    id("java")
    id("application")
    alias(libs.plugins.ebean)
    id("org.openapi.generator") version "7.16.0"

    id("jacoco")
    id("com.github.node-gradle.node") version "7.1.0"
    id("com.diffplug.spotless") version "8.0.0"
    id("name.remal.sonarlint") version "7.0.1"

    id("org.hidetake.ssh") version "2.12.0"
    id("de.undercouch.download") version "5.6.0"
    id("net.researchgate.release") version "3.1.0"
    id("com.google.cloud.tools.jib") version "3.5.2"
    id("com.google.osdetector") version "1.7.3"
}

release {
    tagTemplate = 'V${version}'
}

allprojects {

    apply plugin: "java"
    apply plugin: "jacoco"
    apply plugin: "project-report"
    apply plugin: "com.diffplug.spotless"
    apply plugin: "name.remal.sonarlint"
    apply plugin: "org.hidetake.ssh"
    apply plugin: "com.github.node-gradle.node"
    apply plugin: "com.google.osdetector"

    group = "cool.houge.mahu"

    java {
        sourceCompatibility = JavaVersion.VERSION_25
        targetCompatibility = JavaVersion.VERSION_25
    }

    tasks.withType(JavaCompile).configureEach {
        options.encoding = "UTF-8"
        options.compilerArgs += [
            "-parameters"
        ]
        options.warnings = false
    }

    test {
        useJUnitPlatform()
    }

    node {
        download = true
        version = "22.19.0"
        distBaseUrl = "https://mirrors.huaweicloud.com/nodejs/"
        workDir = rootProject.layout.projectDirectory.dir(".gradle/")
        pnpmWorkDir = rootProject.layout.projectDirectory.dir(".gradle/")
    }

    jacoco {
        toolVersion = "0.8.13"
    }

    jacocoTestReport {
        dependsOn test
        reports {
            html.required = true
            html.outputLocation = layout.buildDirectory.dir("reports/jacoco")
        }
    }

    spotless {
        def osName = System.getProperty("os.name").toLowerCase()
        def nodeExe = osName.contains("win") ? node.resolvedNodeDir.file("node.exe").get() :
            node.resolvedNodeDir.file("bin/node").get()
        def npmExe = osName.contains("win") ? node.resolvedNodeDir.file("npm.cmd").get() :
            node.resolvedNodeDir.file("bin/npm").get()
        def cacheDir = "${rootDir}/.gradle/spotless-npm-install-cache"
        def prettierVersion = "3.6.2"

        java {
            palantirJavaFormat("2.89.0")
            targetExclude("**/src/main/gen/**/*", "**/build/generated/**/*")
        }
        sql {
            target("src/**/*.sql")
            prettier(["prettier": prettierVersion, "prettier-plugin-sql": "0.19.2"])
                .config([
                    "plugins"     : ["prettier-plugin-sql"],
                    "language"    : 'postgresql',
                    "keywordCase" : 'upper',
                    "dataTypeCase": 'upper',
                ])
                .nodeExecutable(nodeExe)
                .npmExecutable(npmExe)
                .npmInstallCache(cacheDir)
                .npmrc("${rootDir}/.npmrc")
        }
        yaml {
            target("src/**/*.yaml", "openapi/admin/**/*.yaml")
            prettier(["prettier": prettierVersion])
                .nodeExecutable(nodeExe)
                .npmExecutable(npmExe)
                .npmInstallCache(cacheDir)
                .npmrc("${rootDir}/.npmrc")
        }
        format("xml") {
            target("src/**/*.xml")
            prettier(["prettier": prettierVersion, "@prettier/plugin-xml": "3.4.2"])
                .config(["tabSize": 4, "plugins": ["@prettier/plugin-xml"]])
                .nodeExecutable(nodeExe)
                .npmExecutable(npmExe)
                .npmInstallCache(cacheDir)
                .npmrc("${rootDir}/.npmrc")
        }
    }
    [tasks.spotlessSql, tasks.spotlessYaml, tasks.spotlessXml].forEach {
        it.dependsOn(nodeSetup)
    }

    sonarLint {
        ignoreFailures = true
        languages {
            include("java")
        }
        rules {
            disable("java:S1611")
        }
        ignoredPaths.add("**/oas/vo/**")
        ignoredPaths.add("**/oas/controller/**")
    }

    sonarlintMain {
        reports {
            html.required = true
        }
    }

    configurations {
        configureEach {
            exclude group: "org.slf4j", module: "slf4j-simple"
            exclude group: "ch.qos.logback", module: "logback-classic"
            exclude group: "ch.qos.logback", module: "logback-core"
            exclude group: "io.avaje", module: "avaje-config"
            exclude group: "io.ebean", module: "ebean-migration"
            exclude group: "io.avaje", module: "avaje-validator-inject-plugin"
            exclude group: "io.avaje", module: "avaje-validator-http-plugin"
        }
    }

    // 部署服务器配置
    remotes {
        dev01 {
            host = "mahu.houge.cool"
            user = "root"
            identity = file("${System.getProperty("user.home")}/.ssh/id_rsa")
        }
    }

