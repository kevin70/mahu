info:
  name: "mahu-admin"
  env: "dev"

server:
  port: 9090
  shutdown-hook: true
  media-context:
    media-supports:
      jackson:
        properties:
          FAIL_ON_UNKNOWN_PROPERTIES: N
          WRITE_DATES_AS_TIMESTAMPS: N
  features:
    cors:
      enabled: true
      allow-origins: [ "*" ]
      allow-methods: [ "*" ]
      allow-headers: [ "*" ]
      allow-credentials: false
      max-age: 7200

db:
  name: "${info.name}"
  url: "jdbc:postgresql://127.0.0.1:5432/mahu"
  username: "postgres"
  password: "postgres"
  min-idle: 1
  max-size: 64
