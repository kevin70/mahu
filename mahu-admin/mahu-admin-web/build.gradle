apply plugin: "application"
apply plugin: "io.avaje.inject"
apply plugin: "com.gradleup.shadow"
apply plugin: "com.bmuschko.docker-remote-api"
apply plugin: "org.openapi.generator"

sourceSets {
    main {
        java {
            srcDir("src/main/gen")
        }
    }
}

processResources {
    filesMatching("application.yaml") {
        //noinspection UnnecessaryQualifiedReference
        filter(org.apache.tools.ant.filters.ReplaceTokens,
            tokens: ["APP_VERSION": version],
            beginToken: "@",
            endToken: "@"
        )
    }
}

application {
    mainClass = "io.helidon.Main"
    applicationDefaultJvmArgs = ["-Dfile.encoding=UTF-8"]
}

jar {
    manifest {
        attributes "Multi-Release": "true"
    }
}

shadowJar {
    mergeServiceFiles()
    archiveFileName = "${project.name}-all.jar"
    exclude(
        "meta-config.yaml",
        "log4j2.xml",
        "Log4j-charsets.properties",
        "Log4j-config.xsd",
        "Log4j-events.dtd",
        "Log4j-events.xsd",
        "Log4j-levels.xsd",
        "log4j2_example.xml",
        "**/license*",
        "**/LICENSE*",
        "**/NOTICE*",
    )

    //noinspection UnnecessaryQualifiedReference
    transform(com.github.jengelman.gradle.plugins.shadow.transformers.IncludeResourceTransformer.class) {
        file = file("$projectDir/config/log4j2.xml")
        resource = "log4j2.xml"
    }

    //noinspection UnnecessaryQualifiedReference
    transform(com.github.jengelman.gradle.plugins.shadow.transformers.IncludeResourceTransformer.class) {
        file = file("$projectDir/config/meta-config.yaml")
        resource = "meta-config.yaml"
    }
}

dependencies {
    annotationProcessor("org.mapstruct:mapstruct-processor:$mapstructVersion")
    annotationProcessor("io.avaje:avaje-validator-generator:$avajeValidatorVersion")
    annotationProcessor("io.avaje:avaje-inject-generator:$avajeInjectVersion")

    implementation(project(":mahu-web"))
    implementation(project(":mahu-admin:mahu-admin-infra"))
    implementation("io.helidon:helidon")
    implementation("io.helidon.logging:helidon-logging-log4j")
    implementation("io.helidon.webserver:helidon-webserver")
    implementation("io.helidon.webserver:helidon-webserver-cors")
    implementation("io.helidon.webserver:helidon-webserver-context")

    implementation("io.avaje:avaje-validator-constraints:$avajeValidatorVersion")
    implementation("io.avaje:avaje-validator:$avajeValidatorVersion") {
        exclude module: "avaje-validator-http-plugin"
    }
    implementation("org.apache.logging.log4j:log4j-core")
    implementation("org.apache.logging.log4j:log4j-slf4j2-impl")

    testImplementation("io.helidon.webserver.testing.junit5:helidon-webserver-testing-junit5")
}

openApiGenerate {
    inputSpec = "${layout.buildDirectory.orNull}/resources/main/META-INF/openapi.yaml"
    generatorName = "java-helidon-server"
    packageName = "cool.houge.mahu.admin"
    apiPackage = "cool.houge.mahu.admin.web.controller"
    modelPackage = "cool.houge.mahu.admin.oas.model"
    templateDir = "${rootDir}/templates"
    configOptions.set([
        library              : "mp",
        useJakartaEe         : "true",
        useBeanValidation    : "true",
        performBeanValidation: "false",
        serializationLibrary : "jackson"
    ])
    typeMappings.set([
        DateTime: "LocalDateTime"
    ])
    importMappings.set([
        "LocalDateTime": "java.time.LocalDateTime"
    ])
    typeMappings.set([
        DateTime: "LocalDateTime"
    ])
    importMappings.set([
        LocalDateTime: "java.time.LocalDateTime"
    ])
}

tasks.named("openApiGenerate").configure {
    dependsOn("clean", "redoclyBundleOpenApi")
    doLast {
        copy {
            from("${project.layout.buildDirectory.orNull}/generate-resources/main/src/main/java") {
                include("**/model/**/*.java")
                exclude("**/web/**", "**/*Impl.java", "**/Main.java", "**/*PageResponse.java")
            }
            into("${projectDir}/src/main/gen")
        }
    }
}

//noinspection UnnecessaryQualifiedReference
tasks.register("redoclyBundleOpenApi", com.github.gradle.node.npm.task.NpxTask.class) {
    group("openapi tools")
    doLast {
        copy {
            from("${layout.buildDirectory.orNull}/resources/main/META-INF/openapi.yaml")
            into("${rootProject.layout.buildDirectory.orNull}/admin")
        }
    }

    command = "@redocly/cli"
    args = ["bundle",
            "$rootDir/openapi/admin/openapi.yaml".toString(),
            "--remove-unused-components",
            "-o",
            "${layout.buildDirectory.orNull}/resources/main/META-INF/openapi.yaml"
    ]
}
jar.dependsOn("redoclyBundleOpenApi")

tasks.register("deployTest") {
    group("distribution")
    dependsOn("build")

    doLast {
        ssh.run {
            session(remotes.hx01) {
                def jarName = shadowJar.archiveFileName.get();
                def pname = project.name
                put(from: "${layout.buildDirectory.get()}/libs/${jarName}", into: "${pname}/lib/temp.${jarName}")
                execute([
                    "source ~/.profile",
                    "PROJECT_HOME=/root/${pname}",
                    "cd \$PROJECT_HOME/bin",
                    "./${pname} stop && sleep 3",
                    "rm -rf \$PROJECT_HOME/lib/${jarName}",
                    "mv \$PROJECT_HOME/lib/temp.${jarName} \$PROJECT_HOME/lib/${jarName}",
                    "nohup ./${pname} > /dev/null 2>&1 &",
                ].join('\n'))
            }
        }
    }
}
