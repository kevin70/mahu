# Helidon Config 元配置。
# 配置源按声明顺序生效，排在前面的优先级更高。
# 测试环境优先使用环境变量 / 系统属性 / 本地覆盖文件，最后回落到测试 classpath 配置。

sources:
  - type: environment-variables
  - type: system-properties
  - type: file
    properties:
      path: ${user.home}/houge/mahu.yaml
      optional: true
  - type: file
    properties:
      path: /etc/houge/mahu.yaml
      optional: true
  - type: classpath
    properties:
      resource: mahu-admin-test.yaml
