apply plugin: "java-library"
apply plugin: "io.ebean"

dependencies {
    annotationProcessor(libs.ebean.querybean.generator)
    annotationProcessor(libs.helidon.bundles.apt)

    // 聚合后的领域层：实体 + 共享业务
    api(project(":mahu-domain"))
    api(project(":mahu-config"))
    api(libs.bundles.jackson)
    api(libs.bundles.helidon.service)
    implementation(libs.bundles.helidon.webclient)
    implementation(libs.password4j)
    implementation(libs.minio)
    implementation(libs.caffeine)
    implementation(libs.roaringbitmap)

    implementation(libs.bundles.ebean)
    implementation(libs.bundles.log4j)
    implementation(libs.valkey.glide) {
        artifact {
            classifier = osdetector.classifier
        }
    }
}
