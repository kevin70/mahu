apply plugin: "java-library"
apply plugin: "io.ebean"

dependencies {
    annotationProcessor("io.ebean:querybean-generator")

    compileOnly("io.helidon.builder:helidon-builder-api")
    compileOnly("io.helidon.webserver:helidon-webserver")
    compileOnly("io.avaje:avaje-validator-constraints")

    api(project(":mahu-common"))
    api(project(":mahu-entity"))
    api(project(":mahu-config"))
    api("com.google.guava:guava")
    api("org.apache.logging.log4j:log4j-api")
    api("io.helidon.security:helidon-security-jwt")
    api("io.helidon.webclient:helidon-webclient")
    api("io.helidon.health:helidon-health-checks")
    api("io.helidon.http.media:helidon-http-media-jackson")
    api("io.helidon.fault-tolerance:helidon-fault-tolerance")
    api("io.helidon.security.providers:helidon-security-providers-oidc")

    api("redis.clients:jedis")
    api("com.rabbitmq:amqp-client")
    api("org.apache.kafka:kafka-clients:4.0.0")
    api("io.minio:minio")
    api("org.bouncycastle:bcprov-jdk18on")
    api("com.password4j:password4j")
    api("io.hypersistence:hypersistence-tsid")
    api("com.github.RoaringBitmap.RoaringBitmap:roaringbitmap")

    api("com.zaxxer:HikariCP")
    api("org.postgresql:postgresql")
    api("io.ebean:ebean-postgres")
    api("io.ebean:ebean-jackson-mapper")
    api("com.github.ben-manes.caffeine:caffeine")

    testImplementation("io.ebean:ebean-test")
    testImplementation("io.specto:hoverfly-java-junit5") {
        exclude module: "logback-classic"
    }
    testImplementation("org.apache.logging.log4j:log4j-core")
    testImplementation("org.apache.logging.log4j:log4j-slf4j2-impl")
    testImplementation("org.testcontainers:testcontainers")
    testImplementation("org.testcontainers:junit-jupiter")
    testImplementation("org.testcontainers:rabbitmq")
    testImplementation("org.testcontainers:postgresql")
    testImplementation("org.testcontainers:kafka")
    testImplementation("org.testcontainers:minio")
    testImplementation(project(":mahu-db"))
}
