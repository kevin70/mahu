apply plugin: "java-library"
apply plugin: "io.ebean"

dependencies {
    annotationProcessor("io.ebean:querybean-generator")
    annotationProcessor("io.helidon.bundles:helidon-bundles-apt")

    api(project(":mahu-entity"))
    api(project(":mahu-config"))
    api(project(":mahu-shared"))
    api("org.apache.logging.log4j:log4j-api")
    api("io.helidon.security:helidon-security-jwt")
    api("io.helidon.webclient:helidon-webclient")
    api("io.helidon.health:helidon-health-checks")
    api("io.helidon.http.media:helidon-http-media-jackson")
    api("io.helidon.fault-tolerance:helidon-fault-tolerance")
    api("io.helidon.service:helidon-service-registry")

    api("io.minio:minio")
    api("com.password4j:password4j")
    api("com.github.ben-manes.caffeine:caffeine")
    api("com.github.RoaringBitmap.RoaringBitmap:roaringbitmap")

    implementation("org.postgresql:postgresql")
    implementation("io.ebean:ebean-postgres")
    implementation("io.ebean:ebean-jackson-mapper")
    implementation("com.github.binarywang:weixin-java-miniapp")
    implementation("com.github.binarywang:weixin-java-pay")

    // testImplementation(project(":mahu-test"))
    testImplementation("io.helidon.testing:helidon-testing-junit5")
}
