      operationId: cancelSysScheduledTask
      x-permission-code: SYS_SCHEDULED_TASK:W
      tags:
        - h_scheduled_task
      responses:
        '204':
          description: OK
  /sys/scheduled-tasks/{task_name}/logs:
    parameters:
      - name: task_name
        description: 任务名称
        in: path
        required: true
        schema:
          type: string
    get:
      summary: 定时任务执行记录
      operationId: pageSysScheduledTaskLog
      x-permission-code: SYS_SCHEDULED_TASK:R
      tags:
        - h_scheduled_task
      parameters:
        - $ref: '#/components/parameters/page_size'
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SysScheduledTaskLogPageResponse'
  /sys/delayed-tasks:
    get:
      summary: 延时任务分页列表
      operationId: pageSysDelayedTask
      x-permission-code: SYS_DELAYED_TASK:R
      tags:
        - h_delayed_task
      parameters:
        - $ref: '#/components/parameters/page_size'
        - $ref: '#/components/parameters/page'
        - name: topic
          in: query
          description: 主题（精确匹配）
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SysDelayedTaskPageResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    AT:
      type: http
      scheme: Bearer
      description: 访问令牌
  parameters:
    ApiVersion:
      $ref: '#/components/parameters/api_version'
    RequestId:
      $ref: '#/components/parameters/request_id'
    page_size:
      name: page_size
      in: query
      description: |
        分页：每页要返回的条目数
      schema:
        type: integer
        format: int32
        default: 20
        minimum: 1
        maximum: 1000
    page:
      name: page
      in: query
      description: |
        分页：页码从`1`开始，默认值为`1`
      schema:
        type: integer
        format: int32
        default: 1
        minimum: 1
        maximum: 100
    include_total:
      name: include_total
      in: query
      description: |
        返回总记录数量

        示例:
        - `GET /tickets?include_total=1` - 分页返回总记录数
        - `GET /tickets` - 分页返回总记录数
        - `GET /tickets?include_total=n` - 不返回总记录数
      schema:
        type: string
        default: 'y'
        enum:
          - '1'
          - 'true'
          - 'false'
          - 'yes'
          - 'on'
          - 'y'
          - 'n'
    path_dict_group_id:
      name: group_id
      in: path
      required: true
      description: |
        分组代码
      schema:
        type: string
    sort:
      name: sort
      in: query
      description: |
        排序参数采取多查询参数传递，每一个字段前都可能有一个负号(`-`)来表示按降序排序。

        示例:
        - `GET /tickets?sort=-priority` - 获取票据列表，按优先级字段降序排序
        - `GET /tickets?sort=-priority&sort=created_at` - 获取票据列表，按`priority`字段降序排序。在一个特定的优先级内，较早的票排在前面。
      schema:
        type: array
        items:
          type: string
    include_deleted:
      in: query
      name: include_deleted
      description: |
        返回数据包涵已经删除的数据

        示例:
        - `GET /tickets?include_deleted=1` - 返回数据包涵已经删除的数据
        - `GET /tickets?include_deleted=n` - 不返回已删除的数据
        - `GET /tickets` - 不返回已删除的数据
      schema:
        type: string
        default: 'n'
        enum:
          - '1'
          - 'true'
          - 'false'
          - 'yes'
          - 'on'
          - 'y'
          - 'n'
    start_date:
      name: start_date
      in: query
      description: |
        起始日期（包含）。格式：YYYY-MM-DD
      schema:
        type: string
        format: date
    end_date:
      name: end_date
      in: query
      description: |
        结束日期（包含）。格式：YYYY-MM-DD
      schema:
        type: string
        format: date
    api_version:
      name: X-API-Version
      in: header
      required: false
      description: 接口主版本号；不传默认按 1 处理
      schema:
        type: string
        enum:
          - '1'
        default: '1'
    request_id:
      name: X-Request-Id
      in: header
      required: false
      description: 请求追踪 ID；不传时服务端会生成并在响应头返回
      schema:
        type: string
  schemas:
    ErrorResponse:
      type: object
      description: 错误响应
      required:
        - error
      properties:
        error:
          type: object
          required:
            - trace_id
            - timestamp
            - path
            - method
            - status
            - code
            - message
          properties:
            trace_id:
              type: string
              description: 日志追踪 ID
              example: 2zy6qqr5mq8zljpxv7g8s
            timestamp:
              type: string
              format: date-time
              description: 时间戳
              example: '2025-09-19T21:17:00+08:00'
            path:
              type: string
              description: 请求路径
              example: /samples
            method:
              type: string
              description: HTTP Method
              example: POST
            status:
              type: integer
              format: int32
              description: HTTP Status
              example: 400
            code:
              type: integer
              format: int32
              description: 错误代码
              example: 140003
            message:
              type: string
              description: 错误描述
              example: 缺少参数
            details:
              type: object
              additionalProperties: true
              description: 详细信息
            stacktrace:
              type: array
              items:
                type: string
              description: 错误堆栈，该字段仅在测试环境返回
    InfoResponse:
      type: object
      required:
        - name
        - version
        - env
        - server_time
        - build
        - java
      properties:
        name:
          type: string
          description: 应用名称
        version:
          type: string
          description: 应用版本
        env:
          type: string
          description: 应用环境
        server_time:
          type: string
          description: 服务器时间
        build:
          type: object
          description: 应用构建信息
          required:
            - time
            - revision
          properties:
            time:
              type: string
              description: 应用构建时间
            revision:
              type: string
              description: Git 提交 Hash 值
        java:
          type: object
          description: 应用 Java 信息
          required:
            - version
            - vendor
          properties:
            version:
              type: string
              description: Java 版本
            vendor:
              type: string
              description: Java 提供商
        enabled_features:
          type: array
          description: 启用的功能代码表
          items:
            type: string
    PublicDictResponse:
      type: object
      required:
        - dc
        - value
        - label
      properties:
        dc:
          type: integer
          format: int32
          description: 字典数据代码，唯一
        value:
          type: string
          description: 字典类型描述
        label:
          type: string
          description: 字典数据标签
        color:
          type: string
          description: 展示用颜色（如 CSS 色值）
          maxLength: 64
        enabled:
          type: boolean
          description: 是否启用
        preset:
          type: boolean
          description: 是否预置
    PublicDictGroupResponse:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          description: 字典分组代码，唯一
        name:
          type: string
          description: 字典分组名称
        description:
          type: string
          description: 字典分组描述
        enabled:
          type: boolean
          description: 是否启用
        preset:
          type: boolean
          description: 是否预置
        data:
          type: array
          description: 字典数据
          items:
            $ref: '#/components/schemas/PublicDictResponse'
    PublicFeatureFlagResponse:
      type: object
      required:
        - code
        - active
      properties:
        code:
          type: string
          description: 功能开关代码，程序通过此字段读取开关
        name:
          type: string
          description: 可读名称
        description:
          type: string
          description: 开关用途说明
        active:
          type: boolean
          description: 开关状态
    TokenPasswordForm:
      type: object
      required:
        - grant_type
        - client_id
        - username
        - password
      properties:
        grant_type:
          type: string
          description: 授权类型
          default: password
        client_id:
          type: string
          description: 请求客户端 ID
        username:
          type: string
          description: 登录用户名
        password:
          type: string
          description: 登录密码
    TokenRefreshTokenForm:
      type: object
      required:
        - grant_type
        - client_id
        - refresh_token
      properties:
        grant_type:
          type: string
          description: 授权类型
          default: refresh_token
        client_id:
          type: string
          description: 请求客户端 ID
        refresh_token:
          type: string
          description: 刷新令牌
    LoginTokenRequest:
      type: object
      oneOf:
        - $ref: '#/components/schemas/TokenPasswordForm'
        - $ref: '#/components/schemas/TokenRefreshTokenForm'
      discriminator:
        propertyName: grant_type
        mapping:
          password: '#/components/schemas/TokenPasswordForm'
          refresh_token: '#/components/schemas/TokenRefreshTokenForm'
    LoginTokenResponse:
      type: object
      required:
        - access_token
        - expires_in
        - refresh_token
      properties:
        token_type:
          type: string
          description: 令牌类型
          example: Bearer
        access_token:
          type: string
          description: 访问令牌
        expires_in:
          type: integer
          format: int32
          description: 过期时间（秒）
          default: 7200
        refresh_token:
          type: string
          description: 刷新令牌
    MeProfileResponse:
      type: object
      required:
        - admin_id
        - nickname
        - avatar
      properties:
        admin_id:
          type: integer
          format: int64
          description: 用户ID
        username:
          type: string
          description: 用户名
        nickname:
          type: string
          description: 昵称
        avatar:
          type: string
          description: 头像 URL
        permission_codes:
          description: 用户拥有的角色代码
          type: array
          items:
            type: string
    MeProfileUpdateRequest:
      type: object
      properties:
        nickname:
          type: string
          description: 昵称
        avatar:
          type: string
          description: 头像地址
    MePasswordUpdateRequest:
      type: object
      required:
        - original_password
        - password
      properties:
        original_password:
          type: string
          description: 原始密码
          maxLength: 64
        password:
          type: string
          description: 新密码
          maxLength: 64
    BasePageResponse:
      type: object
      description: |
        分页响应基类。当请求参数 `include_total` 为 false 时，响应中不包含 `total_items` 字段。
      properties:
        total_items:
          type: integer
          format: int32
          description: 总记录数量；仅当请求中 `include_total` 为 true 时存在
    MeNotificationResponse:
      type: object
      required:
        - id
        - title
        - content
        - scope
        - type
        - status
        - payload
        - read
      properties:
        id:
          type: integer
          format: int64
          description: 通知 ID
        title:
          type: string
          description: 通知标题
        content:
          type: string
          description: 通知内容
        scope:
          type: integer
          format: int32
          description: 发送范围：1定向，2全局
        type:
          type: integer
          format: int32
          description: 通知类型
        status:
          type: integer
          format: int32
          description: 状态：200生效，920过期
        payload:
          type: object
          description: 扩展载荷
          additionalProperties: true
        expire_at:
          type: string
          format: date-time
          description: 过期时间，NULL表示不过期
        created_at:
          type: string
          format: date-time
          description: 创建时间
        updated_at:
          type: string
          format: date-time
          description: 更新时间
        read:
          type: boolean
          description: 当前管理员是否已读
        read_at:
          type: string
          format: date-time
          description: 已读时间
    MeNotificationPageResponse:
      type: object
      allOf:
        - $ref: '#/components/schemas/BasePageResponse'
      properties:
        items:
          type: array
          description: 列表
          items:
            $ref: '#/components/schemas/MeNotificationResponse'
    MeNotificationPollResponse:
      type: object
      required:
        - next_cursor
        - has_more
        - unread_count
        - items
      properties:
        next_cursor:
          type: string
          description: 下一次增量轮询使用的游标
        has_more:
          type: boolean
          description: 是否还有更多数据
        unread_count:
          type: integer
          format: int32
          description: 当前未读总数
        items:
          type: array
          description: 增量通知列表
          items:
            $ref: '#/components/schemas/MeNotificationResponse'
    MeNotificationReadBatchRequest:
      type: object
      required:
        - notification_ids
      properties:
        notification_ids:
          type: array
          description: 通知 ID 列表
          minItems: 1
          maxItems: 200
          items:
            type: integer
            format: int64
    FileType:
      type: string
      description: 上传文件类型
      enum:
        - ADMIN_AVATAR
      x-enumDescriptions:
        ADMIN_AVATAR: 管理员头像
    FileCreatePresignedRequest:
      type: object
      required:
        - type
        - file_name
      properties:
        type:
          $ref: '#/components/schemas/FileType'
        file_name:
          type: string
          description: 上传文件的名称
          minLength: 1
          maxLength: 128
        file_size:
          type: integer
          format: int64
          description: 文件大小
          minimum: 1
    FileCreatePresignedResponse:
      type: object
      required:
        - object_id
        - upload_url
        - access_url
      properties:
        object_id:
          type: string
          description: 对象 ID
        upload_url:
          type: string
          description: 上传 URL
        access_url:
          type: string
          description: 上传成功后的访问 URL
    IdPhotoCreatePresignedRequest:
      type: object
      required:
        - type
        - file_name
      properties:
        type:
          type: integer
          format: int32
          minimum: 0
          maximum: 10000
          description: 证件类型
        file_name:
          type: string
          description: 上传文件的名称
          minLength: 1
          maxLength: 255
        file_size:
          type: integer
          format: int64
          minimum: 0
          description: 文件大小
    IdPhotoCreatePresignedResponse:
      type: object
      required:
        - object_id
        - upload_url
        - access_url
      properties:
        object_id:
          type: string
          description: 对象 ID
        upload_url:
          type: string
          description: 上传 URL
        access_url:
          type: string
          description: 上传成功后的访问 URL
    TerminalTypeEnum:
      type: string
      description: 终端类型
      enum:
        - WECHAT_XCX
        - WECHAT_WEB
        - BROWSER
      x-enum-descriptions:
        - 微信小程序
        - 微信网页授权
        - 浏览器
    SysAuthClientResponse:
      type: object
      description: 客户端
      required:
        - client_id
      properties:
        client_id:
          type: string
          description: 客户端 ID
        created_at:
          type: string
          format: date-time
          description: 创建时间
        updated_at:
          type: string
          format: date-time
          description: 修改时间
        label:
          type: string
          description: 标签
        remark:
          type: string
          description: 备注
        terminal_type:
          $ref: '#/components/schemas/TerminalTypeEnum'
        wechat_appid:
          type: string
          description: 微信应用 ID
    SysAuthClientPageResponse:
      type: object
      description: 客户端列表
      allOf:
        - $ref: '#/components/schemas/BasePageResponse'
      properties:
        items:
          type: array
          description: 客户端列表
          items:
            $ref: '#/components/schemas/SysAuthClientResponse'
    SysAuthClientUpsertRequest:
      type: object
      required:
        - label
        - terminal_type
      properties:
        label:
          type: string
          description: 标签
          maxLength: 128
        remark:
          type: string
          description: 备注
          maxLength: 512
        client_secret:
          type: string
