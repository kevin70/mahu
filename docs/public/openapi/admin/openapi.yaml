openapi: 3.0.3
info:
  title: Mahu 后台接口文档
  version: 1.0.0
  description: |
    ## x-permission-code

    权限代码 (`x-permission-code`) 是用于标识特定权限的字符串。这些权限代码用于系统的权限管理，以确保用户只能访问他们被授权的资源。

    ### 权限代码格式

    权限代码通常由两部分组成：

    1. **权限名称**：表示权限的唯一标识符。
    2. **操作类型**：表示对资源的操作类型，如读取(R)、写入(W)和删除(D)。

    例如，权限代码 `DICT:R` 表示对字典管理的读取权限。

    ## X-Request-Id

    `X-Request-Id` 是一个 HTTP 头字段，用于唯一标识每个请求。它在分布式系统和微服务架构中非常有用，可以帮助跟踪请求在多个服务之间的流动情况，便于日志记录、调试和问题排查。
    `X-Request-Id` 应该是全局唯一的，建议使用 `ULID` 生成的字符串来实现。

    ### 作用

    - **请求跟踪**：`X-Request-Id` 使得每个请求在系统的各个组件之间传递时都有一个唯一的标识符，可以方便地跟踪请求的整个生命周期。
    - **日志关联**：通过在日志中记录 `X-Request-Id`，可以将不同服务的日志条目关联起来，帮助快速定位和解决问题。
    - **性能监控**：结合 `X-Request-Id` 和其他监控工具，可以更准确地测量请求的处理时间和服务间的延迟。
    - **调试和故障排除**：当出现问题时，可以通过 `X-Request-Id` 快速找到相关的日志和数据，从而更快地进行故障排除。

    ### 使用方法

    - **客户端发送请求**：客户端在发送请求时，可以在 HTTP 头中添加 `X-Request-Id` 字段。如果客户端没有提供 `X-Request-Id`，服务端可以自动生成一个并返回给客户端。
    - **服务端接收请求**：服务端接收到请求后，会读取 `X-Request-Id` 并在整个请求处理过程中保持该标识符不变。服务端还可以在响应头中返回 `X-Request-Id`，以便客户端在后续请求中使用相同的标识符。
    - **日志记录**：在每个服务的日志中记录 `X-Request-Id`，确保每个日志条目都包含这个标识符，以便于后续的分析和关联。

    ### 示例

    #### 客户端发送请求

    ```http
    GET /api/resource HTTP/1.1
    Host: example.com
    X-Request-Id: 01H9JQ23GZ54V8KXWYB6CZT3D
    ```

    #### 服务端响应

    ```http
    HTTP/1.1 200 OK
    Content-Type: application/json
    X-Request-Id: 01H9JQ23GZ54V8KXWYB6CZT3D

    {
      "data": "some data"
    }
    ```

    ## X-API-Version

    `X-API-Version` 是用于声明接口主版本号的 HTTP 请求头。通过该请求头，客户端可以在不变更 URL 的情况下选择期望的 API 行为版本。

    ### 取值规则

    - **可选请求头**：客户端可在请求头中传入 `X-API-Version`。
    - **默认版本**：当未传该请求头时，服务端按默认版本 `1` 处理。
    - **支持版本**：当前仅支持 `1`。
    - **非法值处理**：非整数或不支持的版本号会返回参数错误。

    ### 使用建议

    - 客户端应固定传递明确的版本号，避免因默认版本变更带来行为差异。
    - 仅在存在兼容性差异时升级版本号；同一主版本内保持兼容。

    ### 示例

    ```http
    GET /me/profile HTTP/1.1
    Host: example.com
    X-API-Version: 1
    Authorization: Bearer eyJ...
    ```
servers:
  - url: http://127.0.0.1:9093
    description: 本地测试服务
security:
  - AT: []
tags:
  - name: h_help
    x-displayName: 帮助接口
  - name: h_login
    x-displayName: 用户登录
  - name: h_me
    x-displayName: 认证用户
  - name: h_file
    x-displayName: 一般文件
  - name: h_id_photo
    x-displayName: 证件照
  - name: h_public_dict
    x-displayName: 公共字典
  - name: h_public_feature_flag
    x-displayName: 公共功能开关
  - name: h_auth_client
    x-displayName: 认证终端
  - name: h_dict
    x-displayName: 字典数据
  - name: h_permission
    x-displayName: 权限管理
  - name: h_role
    x-displayName: 角色管理
  - name: h_admin
    x-displayName: 管理员管理
  - name: h_feature_flag
    x-displayName: 功能开关
  - name: h_scheduled_task
    x-displayName: 定时任务
  - name: h_delayed_task
    x-displayName: 延时任务
paths:
  /samples:
    get:
      summary: 样例
      tags:
        - h_help
      operationId: getSamples
      description: |
        HTTP 错误码响应 https://www.webfx.com/web-development/glossary/http-status-codes
      responses:
        '200':
          description: OK
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 拒绝访问
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 未找到请求资源
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务器错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /info:
    get:
      summary: 获取应用信息
      operationId: getInfo
      tags:
        - h_help
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfoResponse'
  /p/dicts:
    get:
      summary: 字典分组列表
      operationId: listPublicDict
      tags:
        - h_public_dict
      security: []
      parameters:
        - in: query
          name: group_id
          description: 字典分组 ID
          schema:
            type: array
            items:
              type: string
        - in: query
          name: include_data
          description: 是否包涵 `data` 数据
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                description: 字典列表
                items:
                  $ref: '#/components/schemas/PublicDictGroupResponse'
  /p/dicts/{dc}:
    parameters:
      - in: path
        name: dc
        description: 字典代码
        required: true
        schema:
          type: integer
          format: int32
    get:
      summary: 获取字典数据
      operationId: getPublicDict
      tags:
        - h_public_dict
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicDictResponse'
  /p/feature-flags:
    get:
      summary: 功能开关列表（公共）
      operationId: listPublicFeatureFlags
      tags:
        - h_public_feature_flag
      security: []
      parameters:
        - in: query
          name: code
          description: 功能开关代码，可传多个
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                description: 功能开关列表，仅含 code/name/active
                items:
                  $ref: '#/components/schemas/PublicFeatureFlagResponse'
  /login/token:
    post:
      summary: 获取访问令牌
      description: 获取访问令牌
      operationId: login
      tags:
        - h_login
      security: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginTokenRequest'
      responses:
        '200':
          description: 成功获得访问令牌
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginTokenResponse'
  /me/profile:
    get:
      summary: 获取个人登录信息
      operationId: getMeProfile
      tags:
        - h_me
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeProfileResponse'
    put:
      summary: 更新个人信息
      operationId: updateMeProfile
      tags:
        - h_me
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeProfileUpdateRequest'
      responses:
        '204':
          description: OK
  /me/password:
    put:
      summary: 修改密码
      operationId: updateMePassword
      tags:
        - h_me
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MePasswordUpdateRequest'
      responses:
        '204':
          description: OK
        '403':
          description: 原密码不匹配
  /me/notifications:
    get:
      summary: 我的通知分页列表
      operationId: pageMeNotification
      tags:
        - h_me
      description: |
        返回当前管理员可见通知：
        - 仅状态为 `200`（生效）
        - 且 `(expire_at IS NULL OR expire_at > now())`
        - 全局通知（scope=2）或定向通知（scope=1 且命中目标管理员）

        `read` 参数用于筛选已读/未读：
        - `true` 仅已读
        - `false` 仅未读
      parameters:
        - $ref: '#/components/parameters/page_size'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/include_total'
        - in: query
          name: read
          description: 是否已读，true=已读，false=未读
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeNotificationPageResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/notifications/poll:
    get:
      summary: 我的通知增量轮询
      operationId: getMeNotificationPoll
      tags:
        - h_me
      description: |
        高频轮询增量接口，返回游标之后的变化集合。
        可见性规则与 `/me/notifications` 一致：
        - `status = 200`
        - `(expire_at IS NULL OR expire_at > now())`
        - scope=2 全局，或 scope=1 命中当前管理员

        游标规则：
        - 首次请求不传 `cursor`
        - 后续请求使用上次响应中的 `next_cursor`
        - 服务端按 `(updated_at DESC, id DESC)` 稳定排序
      parameters:
        - in: query
          name: cursor
          description: |
            增量游标。首次请求不传；后续请求传入上次返回的 next_cursor。
          schema:
            type: string
        - in: query
          name: limit
          description: 单次拉取条数，默认 50，最大 200
          schema:
            type: integer
            format: int32
            default: 50
            minimum: 1
            maximum: 200
        - in: query
          name: include_read
          description: 是否包含已读通知，默认 false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeNotificationPollResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/notifications/{notification_id}/read:
    parameters:
      - in: path
        name: notification_id
        required: true
        description: 通知 ID
        schema:
          type: integer
          format: int64
    post:
      summary: 标记我的通知为已读
      operationId: updateMeNotificationRead
      tags:
        - h_me
      description: 幂等操作。重复提交同一通知的已读请求，仍返回 204。
      responses:
        '204':
          description: OK
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/notifications/read-batch:
    post:
      summary: 批量标记我的通知为已读
      operationId: updateBatchMeNotificationRead
      tags:
        - h_me
      description: 幂等操作。已读过的通知会被安全忽略。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeNotificationReadBatchRequest'
      responses:
        '204':
          description: OK
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /files:
    post:
      summary: 文件预签名上传
      operationId: createFilePresigned
      tags:
        - h_file
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileCreatePresignedRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileCreatePresignedResponse'
  /files/{file_id}/forward:
    parameters:
      - in: path
        name: file_id
        description: 文件 ID
        required: true
        schema:
          type: string
          maxLength: 50
    get:
      summary: 定向资源
      operationId: forwardFile
      tags:
        - h_file
      security: []
      responses:
        '302':
          description: OK
          headers:
            Location:
              description: 重写向到资源访问地址
              schema:
                type: string
                format: uri
              example: https://api.example.com/v1/new-resource
  /id-photos:
    post:
      summary: 证件照预签名上传
      operationId: createIdPhotoPresigned
      tags:
        - h_id_photo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdPhotoCreatePresignedRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdPhotoCreatePresignedResponse'
  /id-photos/{id_photo_id}/forward:
    parameters:
      - in: path
        name: id_photo_id
        description: 证件照流水号
        required: true
        schema:
          type: string
          maxLength: 50
    get:
      summary: 定向证件照
      operationId: forwardIdPhoto
      tags:
        - h_id_photo
      responses:
        '302':
          description: OK
          headers:
            Location:
              description: 重写向到证件访问地址
              schema:
                type: string
                format: uri
              example: https://api.example.com/v1/new-resource
  /sys/auth-clients:
    post:
      summary: 新建认证终端
      operationId: createSysAuthClient
      tags:
        - h_auth_client
      x-permission-code: SYS_AUTH_CLIENT:W
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SysAuthClientUpsertRequest'
      responses:
        '204':
          description: OK
    get:
      summary: 认证终端分页列表
      operationId: pageSysAuthClient
      x-permission-code: SYS_AUTH_CLIENT:R
      tags:
        - h_auth_client
      parameters:
        - $ref: '#/components/parameters/page_size'
        - $ref: '#/components/parameters/page'
        - in: query
          name: client_id
          description: 客户端 ID
          schema:
            type: string
        - in: query
          name: terminal_type
          description: 终端类型
          schema:
            type: string
        - in: query
          name: wechat_appid
          description: 微信应用 ID
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SysAuthClientPageResponse'
  /sys/auth-clients/{client_id}:
    parameters:
      - name: client_id
        in: path
        required: true
        description: 客户端 ID
        schema:
          type: string
    get:
      summary: 获取指定认证终端
      operationId: getSysAuthClient
      x-permission-code: SYS_AUTH_CLIENT:R
      tags:
        - h_auth_client
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SysAuthClientResponse'
    delete:
      summary: 删除认证终端
      operationId: deleteSysAuthClient
      x-permission-code: SYS_AUTH_CLIENT:W
      tags:
        - h_auth_client
      responses:
        '204':
          description: OK
    put:
      summary: 修改认证终端
      operationId: updateSysAuthClient
      x-permission-code: SYS_AUTH_CLIENT:W
      tags:
        - h_auth_client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SysAuthClientUpsertRequest'
      responses:
        '204':
          description: OK
  /sys/dict-groups:
    post:
      summary: 新建字典分组
      operationId: createSysDictGroup
      x-permission-code: SYS_DICT:W
      tags:
        - h_dict
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SysDictGroupUpsertRequest'
      responses:
        '204':
          description: OK
    get:
      summary: 字典分组分页列表
      operationId: pageSysDictGroup
      x-permission-code: SYS_DICT:R
      tags:
        - h_dict
      parameters:
        - $ref: '#/components/parameters/page_size'
        - $ref: '#/components/parameters/page'
        - in: query
          name: group_id
          description: 字典分组 ID
          schema:
            type: string
        - in: query
          name: dc
          description: 字典代码
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SysDictPageResponse'
  /sys/dict-groups/{group_id}:
    parameters:
      - $ref: '#/components/parameters/path_dict_group_id'
    get:
      summary: 获取字典分组数据
      operationId: getSysDictGroup
      x-permission-code: SYS_DICT:R
      tags:
        - h_dict
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SysDictGroupResponse'
    put:
      summary: 修改字典分组
      operationId: updateSysDictGroup
      x-permission-code: SYS_DICT:W
      tags:
        - h_dict
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SysDictGroupUpsertRequest'
      responses:
        '204':
          description: OK
    delete:
      summary: 删除字典分组
      operationId: deleteSysDictGroup
      x-permission-code: SYS_DICT:W
      tags:
        - h_dict
      responses:
        '204':
          description: OK
    post:
      summary: 新增字典数据
      operationId: createSysDictData
      x-permission-code: SYS_DICT:W
      tags:
        - h_dict
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SysDictUpsertRequest'
      responses:
        '204':
          description: OK
  /sys/permissions:
    get:
      summary: 系统所有权限代码
      operationId: listSysPermission
      tags:
        - h_permission
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                description: 权限代码列表
                items:
                  $ref: '#/components/schemas/SysPermissionResponse'
  /sys/roles:
    post:
      summary: 新建角色
      operationId: createSysRole
      x-permission-code: SYS_ROLE:W
      tags:
        - h_role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SysRoleUpsertRequest'
      responses:
        '204':
          description: OK
    get:
      summary: 角色分页列表
      operationId: pageSysRole
      x-permission-code: SYS_ROLE:R
      tags:
        - h_role
      parameters:
        - $ref: '#/components/parameters/page_size'
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SysRolePageResponse'
  /sys/roles/{role_id}:
    parameters:
      - name: role_id
        in: path
        required: true
        description: 角色 ID
        schema:
          type: integer
          format: int32
    put:
      summary: 修改角色
      operationId: updateSysRole
      x-permission-code: SYS_ROLE:W
      tags:
        - h_role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SysRoleUpsertRequest'
      responses:
        '204':
          description: OK
    delete:
      summary: 删除角色
      operationId: deleteSysRole
      x-permission-code: SYS_ROLE:W
      tags:
        - h_role
      responses:
        '204':
          description: OK
    get:
      summary: 获取指定角色
      operationId: getSysRole
      x-permission-code: SYS_ROLE:R
      tags:
        - h_role
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SysRoleResponse'
  /sys/admins:
    post:
      summary: 新建管理员
      operationId: createSysAdmin
      x-permission-code: SYS_ADMIN:W
      tags:
        - h_admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SysAdminUpsertRequest'
      responses:
        '204':
          description: OK
    get:
      summary: 管理员分页列表
      operationId: pageSysAdmin
      x-permission-code: SYS_ADMIN:R
      tags:
        - h_admin
      parameters:
