          name: task_name
          description: 任务名称
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SysScheduledTaskPageResponse'
  /sys/scheduled-tasks/{task_name}:
    parameters:
      - name: task_name
