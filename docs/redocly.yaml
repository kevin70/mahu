# See https://redocly.com/docs/cli/configuration/
# See https://redocly.com/docs/redoc/config
extends:
  - recommended

# See https://redocly.com/docs/cli/rules
rules:
  info-license: off
  paths-kebab-case: error
  no-unused-components: error
  path-not-include-query: error
  required-string-property-missing-min-length: error
  operation-singular-tag: warn
  operation-tag-defined: error
  operation-operationId: error
  no-ambiguous-paths: error
  operation-4xx-response: off
  request-mime-type:
    severity: error
    allowedValues:
      - application/json
  response-mime-type:
    severity: error
    allowedValues:
      - application/json
  rule/operationId-casing:
    subject:
      type: Operation
      property: operationId
    assertions:
      casing: camelCase
  rule/parameter-casing:
    subject:
      type: Parameter
    assertions:
      casing: snake_case
  rule/schema-properties-casing:
    subject:
      type: Schema
      property: properties
    assertions:
      casing: snake_case

theme:
  openapi:
    pathInMiddlePanel: true
    hideHostname: true
    showExtensions: true
    generateCodeSamples:
      languages:
        - lang: curl

### 构建文档的命令参考
### redocly build-docs admin@v1 --theme.openapi.sideNavStyle=path-only
apis:
  admin@v1:
    root: ./admin/openapi.yaml
    rules:
      no-ambiguous-paths: error
