upstream mahu-admin-api-backend {
    least_conn;
    server 127.0.0.1:9090;

    keepalive 32;               # 每个worker进程保持的最大空闲连接数
    keepalive_timeout 60s;      # 空闲连接保持时间
}

server {
    listen              443 ssl http2;
    listen              [::]:443 ssl http2;
    server_name         mahu-admin.houge.cool;
    root                /var/www/mahu-admin.houge.cool;

    # allow larger admin uploads/imports without affecting public site
    client_max_body_size 32M;

    # SSL
    ssl_certificate     /etc/nginx/ssl/mahu-admin.houge.cool.crt;
    ssl_certificate_key /etc/nginx/ssl/mahu-admin.houge.cool.key;

    # security
    include             nginxconfig.io/security.conf;

    # logging
    access_log          /var/log/nginx/mahu-admin.houge.cool.access.log combined buffer=512k flush=1m;
    error_log           /var/log/nginx/mahu-admin.houge.cool.error.log warn;

    location ^~ /api/ {
        proxy_pass          http://mahu-admin-api-backend;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    X-Forwarded-Host $host;
        proxy_http_version  1.1;
        proxy_set_header    Connection "";

        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    300s;

        proxy_buffering       on;
        proxy_buffer_size     16k;
        proxy_buffers         16 16k;
    }

    # index.html fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # additional config
    include nginxconfig.io/general.conf;
}

# HTTP redirect
server {
    listen      80;
    listen      [::]:80;
    server_name mahu-admin.houge.cool;
    return      301 https://mahu-admin.houge.cool$request_uri;
}
