apply plugin: "java-library"
apply plugin: "io.ebean"

dependencies {
    annotationProcessor("io.ebean:querybean-generator")
    annotationProcessor("io.helidon.bundles:helidon-bundles-apt")
    compileOnly("io.avaje:avaje-lang")

    api(project(":mahu-config"))
    implementation("io.ebean:ebean-api")
    implementation("io.ebean:ebean-querybean")
    implementation("io.helidon.common:helidon-common-parameters")
    implementation("io.helidon.common:helidon-common-context")
    implementation("io.helidon.common:helidon-common-configurable")

    implementation("io.helidon.service:helidon-service-registry")
    implementation("io.helidon.health:helidon-health-checks")
    implementation("io.helidon.config:helidon-config-yaml")
    implementation("io.helidon.config:helidon-config-encryption")
    implementation("io.helidon.security:helidon-security-jwt")
    implementation("io.helidon.scheduling:helidon-scheduling")

    implementation("io.minio:minio")
    implementation("com.github.ben-manes.caffeine:caffeine")
    implementation("com.fasterxml.jackson.core:jackson-databind")
    implementation("com.fasterxml.jackson.module:jackson-module-parameter-names")
    implementation("com.fasterxml.jackson.module:jackson-module-afterburner")
    implementation("com.fasterxml.jackson.datatype:jackson-datatype-jdk8")
    implementation("com.fasterxml.jackson.datatype:jackson-datatype-jsr310")
    implementation("com.fasterxml.jackson.datatype:jackson-datatype-guava")

    implementation("io.ebean:ebean-api")
    implementation("io.ebean:ebean-core")
    implementation("io.ebean:ebean-querybean")
    implementation("io.ebean:ebean-postgres")
    implementation("org.postgresql:postgresql")
    implementation("io.ebean:ebean-jackson-mapper")

    implementation("io.helidon.service:helidon-service-registry")
    implementation("io.helidon.health:helidon-health-checks")

    implementation("org.apache.logging.log4j:log4j-core")
    implementation("org.apache.logging.log4j:log4j-slf4j2-impl")

    testAnnotationProcessor("io.helidon.bundles:helidon-bundles-apt")
}

