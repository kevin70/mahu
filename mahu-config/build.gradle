apply plugin: "java-library"

dependencies {
    annotationProcessor("io.helidon.bundles:helidon-bundles-apt")
    annotationProcessor(project(":mahu-codegen"))

    compileOnly("io.helidon.builder:helidon-builder-api")
    compileOnly("io.helidon.config.metadata:helidon-config-metadata-codegen")
    compileOnly("io.helidon.builder:helidon-builder-codegen")

    api(project(":mahu-base"))
    api("io.helidon.config:helidon-config-yaml")
    api("io.helidon.config:helidon-config-encryption")
}

tasks.withType(JavaCompile).configureEach {
    options.compilerArgs += [
        "-Xlint:-removal"
    ]
}
