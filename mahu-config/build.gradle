apply plugin: "java-library"

dependencies {
    annotationProcessor("io.helidon.builder:helidon-builder-processor:$helidonVersion")
    annotationProcessor("io.helidon.config:helidon-config-metadata-processor:$helidonVersion")
    annotationProcessor("io.sundr:transform-annotations:$sundrCodegenVersion")
    annotationProcessor("io.sundr:sundr-codegen-velocity-nodeps:$sundrCodegenVersion")

    compileOnly("io.sundr:transform-annotations:$sundrCodegenVersion")
    api("io.helidon.config:helidon-config-yaml:$helidonVersion")
    implementation("io.helidon.builder:helidon-builder-api:$helidonVersion")
}
