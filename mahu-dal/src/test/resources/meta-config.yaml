# 元配置机制（Helidon Config）
# 元配置支持通过专用配置文件对配置系统本身进行初始化。系统会在当前目录和类路径中扫描名为
# `meta-config.*` 的文件（其中 * 表示支持的媒体类型后缀，例如当引入 `helidon-config-yaml` 模块时可使用 `yaml` 格式）。
#
# 优先级规则（非常重要）：
# - **前面声明的配置源优先级更高，后面的优先级更低**
# - 当多个配置源中存在相同 key 时，**排在前面的值会覆盖排在后面的值**
#
# 典型用途（测试环境）：
# - 最后面的 classpath 资源（如 `application-test.yaml`）提供测试默认值
# - 中间的文件（`$HOME`、`/etc`）用于本地/环境级覆盖
# - 最前面的 environment-variables、system-properties 作为最高优先级的覆盖手段
#
# 示例（简化）：
# sources:
#   - type: environment-variables    # 最高优先级
#   - type: system-properties
#   - type: file                     # 中间优先级
#   - type: classpath                # 最低优先级（默认配置）
#
# 注：
# - 未标注 `optional: true` 的配置源默认为强制加载（mandatory）

sources:
  - type: environment-variables
  - type: system-properties
  - type: file
    properties:
      path: ${user.home}/houge/mahu.yaml
      optional: true
  - type: file
    properties:
      path: /etc/houge/mahu.yaml
      optional: true
  - type: classpath
    properties:
      resource: application-test.yaml
      optional: true
