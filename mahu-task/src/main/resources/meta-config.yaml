# Helidon Config 元配置。
# 配置源按声明顺序生效，排在前面的优先级更高。
# 运行时使用环境变量 / 系统属性覆盖本地文件，再回落到 classpath 默认配置。

sources:
  - type: environment-variables
  - type: system-properties
  - type: file
    properties:
      path: ${user.home}/houge/mahu.yaml
      optional: true
  - type: file
    properties:
      path: /etc/houge/mahu.yaml
      optional: true
  - type: classpath
    properties:
      resource: application.yaml
