//file:noinspection UnnecessaryQualifiedReference
apply plugin: "io.ebean"
apply plugin: "application"
apply plugin: "org.openapi.generator"
apply plugin: "com.google.cloud.tools.jib"

application {
    mainClass = "cool.houge.mahu.task.TaskApplication"
    applicationDefaultJvmArgs = ["-Dfile.encoding=UTF-8"]
}

jib {
    from {
        image = "docker.1ms.run/eclipse-temurin:24-jre"
    }
    to {
        image = "registry.cn-hangzhou.aliyuncs.com/houge-cool/mahu-task"
        tags = ["$project.version", "latest"]
    }
    container {
        environment = [
            "TZ": "Asia/Shanghai"
        ]
        jvmFlags = ["-XX:+UseZGC"]
        mainClass = application.mainClass
        ports = ["9090"]
        labels = ["Build-Time": java.time.OffsetDateTime.now().toString()]
    }
    dockerClient {
        executable = "podman"
    }
}

dependencies {
    annotationProcessor("io.ebean:querybean-generator")
    annotationProcessor("io.helidon.bundles:helidon-bundles-apt")

    implementation(project(":mahu-entity"))
    implementation(project(":mahu-config"))
    implementation(project(":mahu-shared"))

    implementation(libs.bundles.helidon.config)
    implementation(libs.bundles.helidon.webserver)
    implementation(libs.bundles.ebean)
    implementation(libs.bundles.log4j)
    implementation(libs.db.scheduler)
}
