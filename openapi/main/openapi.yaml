openapi: 3.0.3
info:
  title: Mahu 接口文档
  version: 1.0.0
servers:
  - url: http://127.0.0.1:9093
    description: 本地测试服务
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: Bearer
      bearerFormat: JWT
security:
  - BearerAuth: [ ]
tags:
  - name: base
    description: 基础接口
  - name: me
    description: 当前认证用户
paths:
  /samples:
    $ref: "paths/samples.yaml"
  /login/token:
    $ref: paths/login_token.yaml
  /me/profile:
    $ref: paths/me_profile.yaml
  /regions:
    $ref: paths/regions.yaml
  /regions/{code}:
    $ref: paths/regions_{code}.yaml
  /dicts:
    $ref: paths/dicts.yaml
  /dicts/{slug}:
    $ref: paths/dicts_{slug}.yaml
  /settings/oss-direct-upload:
    $ref: paths/settings_oss_direct_upload.yaml
