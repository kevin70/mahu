type: object
description: 微信小程序获取令牌
required:
  - grant_type
  - client_id
  - wechat_js_code
  - wechat_encrypt_data
  - wechat_iv
properties:
  grant_type:
    type: string
    description: 授权类型
    example: wechat_xcx
  client_id:
    type: string
    description: 请求客户端 ID
  wechat_js_code:
    type: string
    description: 小程序登录验证码
  wechat_encrypt_data:
    type: string
    description: 微信加密数据
  wechat_iv:
    type: string
    description: 微信加密
