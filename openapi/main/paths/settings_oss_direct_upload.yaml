post:
  summary: 获取客户端直接上传策略
  operationId: makeSettingsOssDirectUpload
  tags:
    - settings
  security:
    - BearerAuth: [ ]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - kind
            - file_name
          properties:
            kind:
              type: string
              description: 存储类型
              enum:
                - USER_AVATAR
              x-enum-descriptions:
                - 用户头像
            file_name:
              type: string
              description: 文件名称
  responses:
    200:
      description: OK
      content:
        application/json:
          schema:
            type: object
            description: OSS 配置响应
            required:
              - upload_url
              - key
              - url
              - policy
              - access_key_id
              - signature
            properties:
              upload_url:
                type: string
                description: 上传地址
              key:
                type: string
                description: 文件名
              url:
                type: string
                description: 资源访问地址
              policy:
                type: string
                description: 上传策略
              access_key_id:
                type: string
                description: 访问键
              signature:
                type: string
                description: 签名
