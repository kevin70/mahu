get:
  summary: 获取行政区
  operationId: listRegions
  tags:
    - base
  parameters:
    - name: depth
      in: query
      description: |
        返回最大深度的行政区，当传入 `code` 查询参数时 `depth` 参数无效
      schema:
        type: integer
        format: int32
        default: 3
        minimum: 1
        maximum: 4
  responses:
    200:
      description: OK
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/GetRegionResponse.yaml
