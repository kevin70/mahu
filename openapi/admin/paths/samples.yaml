get:
  summary: 样例
  description: |
    HTTP 错误码响应 https://www.webfx.com/web-development/glossary/http-status-codes
  responses:
    400:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    403:
      description: 拒绝访问
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    404:
      description: 未找到请求资源
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    500:
      description: 服务器错误
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
