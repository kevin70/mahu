parameters:
  - name: id
    in: path
    description: 商店 ID
    schema:
      type: integer
      format: int32
get:
  summary: 获取指定 ID 的门店
  operationId: getShop
  x-role-permit: MART_SHOP:R
  tags:
    - mart
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/ShopResponse.yaml"
put:
  summary: 修改门店
  operationId: updateShop
  x-role-permit: MART_SHOP:W
  tags:
    - mart
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/UpsertShopRequest.yaml"
  responses:
    "204":
      description: OK
delete:
  summary: 删除门店
  operationId: deleteShop
  x-role-permit: MART_SHOP:D
  tags:
    - mart
  responses:
    "204":
      description: OK
