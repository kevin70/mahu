parameters:
  - $ref: "../components/parameters/path_type_code.yaml"
get:
  summary: 获取指定字典类型数据
  operationId: getDictType
  x-permission-code: DICT:R
  tags: [ h-dict ]
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/SystemDictTypeResponse.yaml"
put:
  summary: 修改字典类型
  operationId: updateDictType
  x-permission-code: DICT:W
  tags: [ h-dict ]
  requestBody:
    content:
      application/json:
        schema:
          $ref: "../components/schemas/UpsertSystemDictTypeRequest.yaml"
  responses:
    "204":
      description: OK
delete:
  summary: 删除字典类型
  operationId: deleteDictType
  x-permission-code: DICT:W
  tags: [ h-dict ]
  responses:
    "204":
      description: OK
post:
  summary: 新增字典数据
  operationId: addDictData
  x-permission-code: DICT:W
  tags: [ h-dict ]
  requestBody:
    content:
      application/json:
        schema:
          $ref: "../components/schemas/UpsertSystemDictRequest.yaml"
  responses:
    "204":
      description: OK
