parameters:
  - in: path
    name: feature_id
    required: true
    description: 功能 ID
    schema:
      type: integer
      format: int32
get:
  summary: 获取指定功能
  operationId: getSysFeature
  x-permission-code: SYS_FEATURE:R
  tags: [h_feature]
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/SysFeatureResponse.yaml"
put:
  summary: 修改功能
  operationId: updateSysFeature
  x-permission-code: SYS_FEATURE:W
  tags: [h_feature]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/SysFeatureUpdateRequest.yaml"
  responses:
    "204":
      description: OK
