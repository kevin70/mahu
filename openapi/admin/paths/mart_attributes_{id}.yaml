parameters:
  - name: id
    in: path
    description: 数据 ID
    schema:
      type: integer
      format: int32
put:
  summary: 更新商品属性
  operationId: updateMartAttribute
  x-role-permit: MART_ATTRIBUTE:W
  tags:
    - mart
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/UpsertMartAttributeRequest.yaml
  responses:
    "204":
      description: OK
delete:
  summary: 删除商品属性
  operationId: deleteMartAttribute
  x-role-permit: MART_ATTRIBUTE:D
  tags:
    - mart
  responses:
    "204":
      description: OK
get:
  summary: 获取指定的商品属性
  operationId: getMartAttribute
  x-role-permit: MART_ATTRIBUTE:R
  tags:
    - mart
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/MartAttributeResponse.yaml
