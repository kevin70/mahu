post:
  summary: 新建认证终端
  operationId: createSysAuthClient
  tags: [ h-auth-client ]
  x-permission-code: SYS_AUTH_CLIENT:W
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/SysClientUpsertRequest.yaml"
  responses:
    "204":
      description: OK
get:
  summary: 认证终端分页列表
  operationId: pageSysClient
  x-permission-code: SYS_AUTH_CLIENT:R
  tags: [ h-auth-client ]
  parameters:
    - $ref: "../components/parameters/limit.yaml"
    - $ref: "../components/parameters/offset.yaml"
    - $ref: "../components/parameters/filter.yaml"
    - $ref: "../components/parameters/sort.yaml"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/SysClientPageResponse.yaml"
