post:
  summary: 新建认证终端
  operationId: createSysAuthClient
  tags: [h_auth_client]
  x-permission-code: SYS_AUTH_CLIENT:W
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/SysAuthClientUpsertRequest.yaml"
  responses:
    "204":
      description: OK
get:
  summary: 认证终端分页列表
  operationId: pageSysAuthClient
  x-permission-code: SYS_AUTH_CLIENT:R
  tags: [h_auth_client]
  parameters:
    - $ref: "../components/parameters/page_size.yaml"
    - $ref: "../components/parameters/page.yaml"
    - in: query
      name: client_id
      description: 客户端 ID
      schema:
        type: string
    - in: query
      name: terminal_type
      description: 终端类型
      schema:
        type: string
    - in: query
      name: wechat_appid
      description: 微信应用 ID
      schema:
        type: string
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/SysAuthClientPageResponse.yaml"
