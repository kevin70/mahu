post:
  summary: 新建客户端
  operationId: createSystemClient
  tags: [ h-system-client ]
  x-permission-code: SYSTEM_CLIENT:W
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/UpsertSystemClientRequest.yaml"
  responses:
    "204":
      description: OK
get:
  summary: 客户端列表
  operationId: pageSystemClients
  x-permission-code: SYSTEM_CLIENT:R
  tags: [ h-system-client ]
  parameters:
    - $ref: "../components/parameters/limit.yaml"
    - $ref: "../components/parameters/offset.yaml"
    - $ref: "../components/parameters/filter.yaml"
    - $ref: "../components/parameters/sort.yaml"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/PageSystemClientResponse.yaml"
