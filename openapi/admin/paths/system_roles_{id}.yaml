parameters:
  - name: id
    in: path
    description: 角色 ID
    schema:
      type: integer
      format: int32
put:
  summary: 修改角色
  operationId: updateRole
  x-role-permit: ROLE:W
  tags:
    - system
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/UpsertRoleRequest.yaml"
  responses:
    "204":
      description: OK
delete:
  summary: 删除角色
  operationId: deleteRole
  x-role-permit: ROLE:W
  tags:
    - system
  responses:
    "204":
      description: OK
get:
  summary: 获取指定 ID 的角色信息
  operationId: getRole
  x-role-permit: ROLE:R
  tags:
    - system
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/RoleResponse.yaml"
