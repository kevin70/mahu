put:
  summary: 修改密码
  operationId: updateMePassword
  tags: [ h-me ]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - original_password
            - password
          properties:
            original_password:
              type: string
              description: 原始密码
              maxLength: 64
            password:
              type: string
              description: 新密码
              maxLength: 64
  responses:
    "204":
      description: OK
    "403":
      description: 原密码不匹配
