parameters:
  - name: role_id
    in: path
    description: 角色 ID
    schema:
      type: integer
      format: int32
put:
  summary: 修改角色
  operationId: updateSystemRole
  x-permission-code: ROLE:W
  tags: [ h-system-role ]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/UpsertSystemRoleRequest.yaml"
  responses:
    "204":
      description: OK
delete:
  summary: 删除角色
  operationId: deleteSystemRole
  x-permission-code: ROLE:W
  tags: [ h-system-role ]
  responses:
    "204":
      description: OK
get:
  summary: 获取指定角色
  operationId: getSystemRole
  x-permission-code: ROLE:R
  tags:
    - system
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/SystemRoleResponse.yaml"
