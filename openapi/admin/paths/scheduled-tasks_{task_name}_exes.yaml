parameters:
  - name: task_name
    description: 任务名称
    in: path
    required: true
    schema:
      type: string
post:
  summary: 立即执行任务
  operationId: executeScheduledTask
  x-permission-code: SCHEDULED_TASK:W
  tags: [ h-scheduled-task ]
  responses:
    204:
      description: OK
delete:
  deprecated: true
  summary: 取消执行任务
  operationId: cancelScheduledTask
  x-permission-code: SCHEDULED_TASK:W
  tags: [ h-scheduled-task ]
  responses:
    204:
      description: OK
get:
  summary: 定时任务执行记录
  operationId: pageScheduledTaskExeLog
  x-permission-code: SCHEDULED_TASK:R
  tags: [ h-scheduled-task ]
  parameters:
    - $ref: "../components/parameters/limit.yaml"
    - $ref: "../components/parameters/offset.yaml"
    - $ref: "../components/parameters/filter.yaml"
    - $ref: "../components/parameters/sort.yaml"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/PageSystemScheduledTaskExecutionResponse.yaml"
