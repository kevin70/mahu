get:
  summary: 字典分组列表
  operationId: listPublicDict
  tags: [h_public_dict]
  security: []
  parameters:
    - in: query
      name: group_id
      description: 字典分组 ID
      schema:
        type: array
        items:
          type: string
    - in: query
      name: include_data
      description: 是否包涵 `data` 数据
      schema:
        type: boolean
        default: false
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: array
            description: 字典列表
            items:
              $ref: "../components/schemas/PublicDictGroupResponse.yaml"
