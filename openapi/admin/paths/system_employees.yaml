post:
  summary: 新增职员
  operationId: addEmployee
  x-role-permit: EMPLOYEE:W
  tags:
    - system
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/UpsertEmployeeRequest.yaml
  responses:
    "204":
      description: OK
get:
  summary: 职员列表
  operationId: listEmployees
  x-role-permit: EMPLOYEE:R
  tags:
    - system
  parameters:
    - $ref: ../components/parameters/limit.yaml
    - $ref: ../components/parameters/offset.yaml
    - $ref: ../components/parameters/filter.yaml
    - $ref: ../components/parameters/sort.yaml
    - $ref: ../components/parameters/include_deleted.yaml
    - $ref: ../components/parameters/no_total_count.yaml
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ListEmployeesPageResponse.yaml
