parameters:
  - $ref: "../components/parameters/path_dict_type_id.yaml"
get:
  summary: 获取字典类型数据
  operationId: getSysDictType
  x-permission-code: SYS_DICT:R
  tags: [h_dict]
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/SysDictTypeResponse.yaml"
put:
  summary: 修改字典类型
  operationId: updateSysDictType
  x-permission-code: SYS_DICT:W
  tags: [h_dict]
  requestBody:
    content:
      application/json:
        schema:
          $ref: "../components/schemas/SysDictTypeUpsertRequest.yaml"
  responses:
    "204":
      description: OK
delete:
  summary: 删除字典类型
  operationId: deleteSysDictType
  x-permission-code: SYS_DICT:W
  tags: [h_dict]
  responses:
    "204":
      description: OK
post:
  summary: 新增字典数据
  operationId: createSysDictData
  x-permission-code: SYS_DICT:W
  tags: [h_dict]
  requestBody:
    content:
      application/json:
        schema:
          $ref: "../components/schemas/SysDictUpsertRequest.yaml"
  responses:
    "204":
      description: OK
