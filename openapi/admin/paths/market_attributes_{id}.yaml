parameters:
  - name: id
    in: path
    description: 数据 ID
    schema:
      type: integer
      format: int32
put:
  summary: 更新商品属性
  operationId: updateMarketAttribute
  x-role-permit: MARKET_ATTRIBUTE:W
  tags:
    - market
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/UpsertMarketAttributeRequest.yaml
  responses:
    "204":
      description: OK
delete:
  summary: 删除商品属性
  operationId: deleteMarketAttribute
  x-role-permit: MARKET_ATTRIBUTE:D
  responses:
    "204":
      description: OK
get:
  summary: 获取指定的商品属性
  operationId: getMarketAttribute
  x-role-permit: MARKET_ATTRIBUTE:R
  tags:
    - market
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/GetMarketAttributeResponse.yaml
