  operationId: updateBatchMeNotificationRead
  tags: [h_me]
  description: 幂等操作。已读过的通知会被安全忽略。
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/MeNotificationReadBatchRequest.yaml"
  responses:
    "204":
