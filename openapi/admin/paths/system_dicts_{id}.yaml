parameters:
  - name: id
    in: path
    description: 数据 ID
    schema:
      type: integer
      format: int32
put:
  summary: 修改字典
  operationId: updateDict
  x-role-permit: DICT:W
  tags:
    - system
  requestBody:
    content:
      application/json:
        schema:
          $ref: "../components/schemas/UpsertDictRequest.yaml"
  responses:
    "204":
      description: OK
delete:
  summary: 删除字典
  operationId: deleteDict
  x-role-permit: DICT:W
  tags:
    - system
  responses:
    "204":
      description: OK
get:
  summary: 分页查询字典数据
  operationId: getDict
  x-role-permit: DICT:R
  tags:
    - system
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/GetDictResponse.yaml"
