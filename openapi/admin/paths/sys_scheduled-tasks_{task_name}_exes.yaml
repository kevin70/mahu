parameters:
  - name: task_name
    description: 任务名称
    in: path
    required: true
    schema:
      type: string
post:
  summary: 立即执行任务
  operationId: executeSysScheduledTask
  x-permission-code: SYS_SCHEDULED_TASK:W
  tags: [h_scheduled_task]
  responses:
    204:
      description: OK
delete:
  deprecated: true
  summary: 取消执行任务
  operationId: cancelSysScheduledTask
  x-permission-code: SYS_SCHEDULED_TASK:W
  tags: [h_scheduled_task]
  responses:
    204:
      description: OK
get:
  summary: 定时任务执行记录
  operationId: pageSysScheduledTaskExe
  x-permission-code: SYS_SCHEDULED_TASK:R
  tags: [h_scheduled_task]
  parameters:
    - $ref: "../components/parameters/size.yaml"
    - $ref: "../components/parameters/page.yaml"
    - $ref: "../components/parameters/filter.yaml"
    - $ref: "../components/parameters/sort.yaml"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/SysScheduledTaskExePageResponse.yaml"
