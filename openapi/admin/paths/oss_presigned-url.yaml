post:
  summary: 获取对象存储预签名URL
  operationId: getOssPresignedUrl
  tags:
    - base
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            kind:
              type: string
              description: >
                存储类型
                - `ADMIN_AVATAR` 管理员头像
                - `MART_SHOP_ASSET` 商店资源
  responses:
    200:
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              bucket_name:
                type: string
                description: Bucket 名称
              object_name:
                type: string
                description: 对象名称
              expiry:
                type: string
                description: 过期时间（秒）
