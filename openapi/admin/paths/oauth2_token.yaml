post:
  summary: 使用 OAuth2 获取访问令牌
  description: 获取令牌
  operationId: getOAuth2Token
  tags: [ base ]
  security: [ ]
  requestBody:
    required: true
    content:
      application/x-www-form-urlencoded:
        schema:
          type: object
          oneOf:
            - $ref: "../components/schemas/TokenPasswordForm.yaml"
            - $ref: "../components/schemas/TokenRefreshTokenForm.yaml"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/TokenResponse.yaml"
