post:
  summary: 新建字典分组
  operationId: createSysDictGroup
  x-permission-code: SYS_DICT:W
  tags: [h_dict]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/SysDictGroupUpsertRequest.yaml"
  responses:
    "204":
      description: OK
get:
  summary: 字典分组分页列表
  operationId: pageSysDictGroup
  x-permission-code: SYS_DICT:R
  tags: [h_dict]
  parameters:
    - $ref: "../components/parameters/page_size.yaml"
    - $ref: "../components/parameters/page.yaml"
    - in: query
      name: group_id
      description: 字典分组 ID
      schema:
        type: string
    - in: query
      name: dc
      description: 字典代码
      schema:
        type: integer
        format: int32
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/SysDictPageResponse.yaml"
