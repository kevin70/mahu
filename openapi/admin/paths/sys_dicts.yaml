post:
  summary: 新建字典类型
  operationId: createSysDictType
  x-permission-code: SYS_DICT:W
  tags: [ h-dict ]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/SysDictTypeUpsertRequest.yaml"
  responses:
    "204":
      description: OK
get:
  summary: 字典类型分页列表
  operationId: pageSysDictType
  x-permission-code: SYS_DICT:R
  tags: [ h-dict ]
  parameters:
    - $ref: "../components/parameters/limit.yaml"
    - $ref: "../components/parameters/offset.yaml"
    - $ref: "../components/parameters/filter.yaml"
    - $ref: "../components/parameters/sort.yaml"
    - $ref: "../components/parameters/no_total.yaml"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/SysDictPageResponse.yaml"
