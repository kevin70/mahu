get:
  summary: 获取个人登录信息
  operationId: getMeProfile
  tags: [ h-me ]
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/MeProfileResponse.yaml"
put:
  summary: 更新个人信息
  operationId: updateMeProfile
  tags: [ h-me ]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/MeProfileUpdateRequest.yaml"
  responses:
    "204":
      description: OK
