post:
  summary: 新建商店
  operationId: createShop
  x-role-permit: MART_SHOP:W
  tags:
    - mart
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/UpsertShopRequest.yaml"
  responses:
    "204":
      description: OK
get:
  summary: 商店列表
  operationId: listShops
  x-role-permit: MART_SHOP:R
  tags:
    - mart
  parameters:
    - $ref: "../components/parameters/limit.yaml"
    - $ref: "../components/parameters/offset.yaml"
    - $ref: "../components/parameters/filter.yaml"
    - $ref: "../components/parameters/sort.yaml"
    - $ref: "../components/parameters/include_deleted.yaml"
    - $ref: "../components/parameters/no_total_count.yaml"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/ShopsPageResponse.yaml"
