get:
  summary: 获取可用的商城分类
  operationId: listPMartCategories
  tags:
    - base
  responses:
    200:
      description: OK
      content:
        application/json:
          schema:
            type: array
            description: 列表
            items:
              type: object
              required:
                - id
                - name
                - ordering
              properties:
                id:
                  type: integer
                  format: int32
                  description: 分类 ID
                name:
                  type: string
                  description: 分类名称
                ordering:
                  type: integer
                  format: int32
                  description: 排序值
                parent_id:
                  type: integer
                  format: int32
                  description: 父分类 ID
                remark:
                  type: string
                  description: 备注
