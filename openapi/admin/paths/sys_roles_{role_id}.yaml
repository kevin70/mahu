parameters:
  - name: role_id
    in: path
    description: 角色 ID
    schema:
      type: integer
      format: int32
put:
  summary: 修改角色
  operationId: updateSysRole
  x-permission-code: SYS_ROLE:W
  tags: [h-role]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/SysRoleUpsertRequest.yaml"
  responses:
    "204":
      description: OK
delete:
  summary: 删除角色
  operationId: deleteSysRole
  x-permission-code: SYS_ROLE:W
  tags: [h-role]
  responses:
    "204":
      description: OK
get:
  summary: 获取指定角色
  operationId: getSysRole
  x-permission-code: SYS_ROLE:R
  tags: [h-role]
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/SysRoleResponse.yaml"
