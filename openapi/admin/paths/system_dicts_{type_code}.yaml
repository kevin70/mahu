parameters:
  - name: type_code
    in: path
    description: 数据类型代码
    required: true
    schema:
      type: string
get:
  summary: 获取指定类型代码的数据
  operationId: getSystemDict
  x-role-permit: DICT:R
  tags:
    - system
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/DictResponse.yaml"
put:
  summary: 修改数据字典类型
  operationId: updateSystemDict
  x-role-permit: DICT:W
  tags:
    - system
  requestBody:
    content:
      application/json:
        schema:
          $ref: "../components/schemas/UpsertDictRequest.yaml"
  responses:
    "204":
      description: OK
delete:
  summary: 删除字典类型数据
  operationId: deleteSystemDictType
  x-role-permit: DICT:W
  tags:
    - system
  responses:
    "204":
      description: OK
post:
  summary: 新增字典数据
  operationId: addSystemDictData
  x-role-permit: DICT:W
  tags:
    - system
  requestBody:
    content:
      application/json:
        schema:
          $ref: "../components/schemas/UpsertDictDataRequest.yaml"
  responses:
    "204":
      description: OK
