parameters:
  - $ref: "../components/parameters/path_type_code.yaml"
get:
  summary: 获取指定类型代码的数据
  operationId: getSystemDictType
  x-permission-code: SYSTEM_DICT:R
  tags: [ system ]
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/SystemDictTypeResponse.yaml"
put:
  summary: 修改数据字典类型
  operationId: updateSystemDictType
  x-permission-code: SYSTEM_DICT:W
  tags: [ system ]
  requestBody:
    content:
      application/json:
        schema:
          $ref: "../components/schemas/UpsertSystemDictTypeRequest.yaml"
  responses:
    "204":
      description: OK
delete:
  summary: 删除字典类型数据
  operationId: deleteSystemDictType
  x-permission-code: SYSTEM_DICT:W
  tags: [ system ]
  responses:
    "204":
      description: OK
post:
  summary: 新增字典数据
  operationId: addSystemDictData
  x-permission-code: SYSTEM_DICT:W
  tags: [ system ]
  requestBody:
    content:
      application/json:
        schema:
          $ref: "../components/schemas/UpsertSystemDictRequest.yaml"
  responses:
    "204":
      description: OK
