post:
  summary: 新建数据字典
  operationId: createSystemDict
  x-role-permit: DICT:W
  tags:
    - system
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/UpsertDictRequest.yaml"
  responses:
    "204":
      description: OK
get:
  summary: 获取数据字典
  operationId: listSystemDicts
  x-role-permit: DICT:R
  tags:
    - system
  parameters:
    - $ref: "../components/parameters/limit.yaml"
    - $ref: "../components/parameters/offset.yaml"
    - $ref: "../components/parameters/filter.yaml"
    - $ref: "../components/parameters/sort.yaml"
    - $ref: "../components/parameters/no_total_count.yaml"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/DictsPageResponse.yaml"
