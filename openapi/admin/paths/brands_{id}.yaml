parameters:
  - name: id
    in: path
    description: 品牌 ID
    schema:
      type: integer
      format: int32
get:
  summary: 获取指定 ID 的品牌
  operationId: getBrand
  x-role-permit: BRAND:R
  tags:
    - base
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/GetBrandResponse.yaml
delete:
  summary: 删除指定品牌
  operationId: deleteBrand
  x-role-permit: BRAND:D
  tags:
    - base
  responses:
    "204":
      description: OK
put:
  summary: 修改品牌
  operationId: updateBrand
  x-role-permit: BRAND:U
  tags:
    - base
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/UpsertBrandRequest.yaml
  responses:
    "204":
      description: OK
