post:
  summary: 新建数据字典
  operationId: createDictType
  x-permission-code: DICT:W
  tags: [ h-dict ]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/UpsertSystemDictTypeRequest.yaml"
  responses:
    "204":
      description: OK
get:
  summary: 数据字典分页列表
  operationId: pageDict
  x-permission-code: DICT:R
  tags: [ h-dict ]
  parameters:
    - $ref: "../components/parameters/limit.yaml"
    - $ref: "../components/parameters/offset.yaml"
    - $ref: "../components/parameters/filter.yaml"
    - $ref: "../components/parameters/sort.yaml"
    - $ref: "../components/parameters/no_total.yaml"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/PageSystemDictResponse.yaml"
