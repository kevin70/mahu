parameters:
  - name: admin_id
    in: path
    description: 管理员 ID
    required: true
    schema:
      type: integer
      format: int32
put:
  summary: 修改管理员
  operationId: updateAdmin
  x-permission-code: ADMIN:W
  tags: [ h-admin ]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/UpsertSystemAdminRequest.yaml"
  responses:
    "204":
      description: OK
delete:
  summary: 删除管理员
  operationId: deleteAdmin
  x-permission-code: ADMIN:W
  tags: [ h-admin ]
  responses:
    "204":
      description: OK
get:
  summary: 获取指定管理员
  operationId: getAdmin
  x-permission-code: ADMIN:R
  tags: [ h-admin ]
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/SystemAdminResponse.yaml"
