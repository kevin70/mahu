parameters:
  - $ref: "../components/parameters/path_dict_group_id.yaml"
get:
  summary: 获取字典分组数据
  operationId: getSysDictGroup
  x-permission-code: SYS_DICT:R
  tags: [h_dict]
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/SysDictGroupResponse.yaml"
put:
  summary: 修改字典分组
  operationId: updateSysDictGroup
  x-permission-code: SYS_DICT:W
  tags: [h_dict]
  requestBody:
    content:
      application/json:
        schema:
          $ref: "../components/schemas/SysDictGroupUpsertRequest.yaml"
  responses:
    "204":
      description: OK
delete:
  summary: 删除字典分组
  operationId: deleteSysDictGroup
  x-permission-code: SYS_DICT:W
  tags: [h_dict]
  responses:
    "204":
      description: OK
post:
  summary: 新增字典数据
  operationId: createSysDictData
  x-permission-code: SYS_DICT:W
  tags: [h_dict]
  requestBody:
    content:
      application/json:
        schema:
          $ref: "../components/schemas/SysDictUpsertRequest.yaml"
  responses:
    "204":
      description: OK

