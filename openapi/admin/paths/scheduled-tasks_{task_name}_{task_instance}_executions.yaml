parameters:
  - name: task_name
    description: 任务名称
    in: path
    required: true
    schema:
      type: string
  - name: task_instance
    description: 任务实例名称
    in: path
    required: true
    schema:
      type: string
post:
  summary: 立即执行任务
  operationId: executeScheduledTask
  x-role-permit: SCHEDULED_TASK:W
  tags:
    - system
  responses:
    204:
      description: OK
delete:
  summary: 删除当前执行状态
  operationId: deleteScheduledTaskExecution
  x-role-permit: SYSTEM_SCHEDULED_TASK:W
  tags:
    - system
  responses:
    204:
      description: OK
get:
  summary: 定时任务
  operationId: listScheduledTaskExecutions
  x-role-permit: SCHEDULED_TASK:R
  tags:
    - system
  parameters:
    - $ref: "../components/parameters/limit.yaml"
    - $ref: "../components/parameters/offset.yaml"
    - $ref: "../components/parameters/filter.yaml"
    - $ref: "../components/parameters/sort.yaml"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/ScheduledTaskExecutionsPageResponse.yaml"
