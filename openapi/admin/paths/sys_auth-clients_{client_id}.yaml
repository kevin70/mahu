parameters:
  - name: client_id
    in: path
    description: 客户端 ID
    schema:
      type: string
get:
  summary: 获取指定认证终端
  operationId: getSysAuthClient
  x-permission-code: SYS_AUTH_CLIENT:R
  tags: [h_auth_client]
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/SysAuthClientResponse.yaml"
delete:
  summary: 删除认证终端
  operationId: deleteSysAuthClient
  x-permission-code: SYS_AUTH_CLIENT:W
  tags: [h_auth_client]
  responses:
    "204":
      description: OK
put:
  summary: 修改认证终端
  operationId: updateSysAuthClient
  x-permission-code: SYS_AUTH_CLIENT:W
  tags: [h_auth_client]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/SysAuthClientUpsertRequest.yaml"
  responses:
    "204":
      description: OK
