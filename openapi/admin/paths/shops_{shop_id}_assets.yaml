parameters:
  - $ref: ../components/parameters/path_shop_id.yaml
post:
  summary: 新增资源
  operationId: addShopAsset
  x-role-permit: MART_ASSET:W
  tags:
    - mart
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/UpsertShopAssetRequest.yaml
  responses:
    204:
      description: OK
delete:
  summary: 批量删除资源
  operationId: batchDeleteShopAsset
  x-role-permit: MART_ASSET:D
  tags:
    - mart
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            asset_ids:
              type: array
              description: 要删除的资源 IDs
              maxItems: 1000
              items:
                type: integer
                format: int64
  responses:
    204:
      description: OK
get:
  summary: 资源列表
  operationId: listShopAssets
  x-role-permit: MART_ASSET:R
  tags:
    - mart
  parameters:
    - $ref: ../components/parameters/limit.yaml
    - $ref: ../components/parameters/offset.yaml
    - $ref: ../components/parameters/filter.yaml
    - $ref: ../components/parameters/sort.yaml
    - $ref: ../components/parameters/include_deleted.yaml
    - $ref: ../components/parameters/no_total_count.yaml
  responses:
    200:
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ListShopAssetsPageResponse.yaml

