get:
  summary: 功能分页列表
  operationId: pageSysFeature
  x-permission-code: SYS_FEATURE:R
  tags: [h_feature]
  parameters:
    - $ref: "../components/parameters/page_size.yaml"
    - $ref: "../components/parameters/page.yaml"
    - in: query
      name: status
      description: 状态
      schema:
        type: array
        items:
          type: integer
          minimum: 0
          maximum: 9999
        maxItems: 99
    - in: query
      name: name
      description: 名称
      schema:
        type: string
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/SysFeaturePageResponse.yaml"
