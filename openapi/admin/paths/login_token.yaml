post:
  summary: 获取访问令牌
  description: 获取访问令牌
  operationId: login
  tags: [ base ]
  security: [ ]
  requestBody:
    content:
      application/json:
        schema:
          type: object
          oneOf:
            - $ref: "../components/schemas/TokenPasswordForm.yaml"
            - $ref: "../components/schemas/TokenRefreshTokenForm.yaml"
          discriminator:
            propertyName: grant_type
  responses:
    "200":
      description: 成功获得访问令牌
      content:
        application/json:
          schema:
            $ref: "../components/schemas/LoginResponse.yaml"
