post:
  summary: 新建角色
  operationId: createSysRole
  x-permission-code: SYS_ROLE:W
  tags: [h_role]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/SysRoleUpsertRequest.yaml"
  responses:
    "204":
      description: OK
get:
  summary: 角色分页列表
  operationId: pageSysRole
  x-permission-code: SYS_ROLE:R
  tags: [h_role]
  parameters:
    - $ref: "../components/parameters/per_page.yaml"
    - $ref: "../components/parameters/page.yaml"
    - $ref: "../components/parameters/filter.yaml"
    - $ref: "../components/parameters/sort.yaml"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/SysRolePageResponse.yaml"
