post:
  summary: 保存属性
  operationId: addMartAttribute
  x-role-permit: MART_ATTRIBUTE:W
  tags:
    - mart
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/UpsertMartAttributeRequest.yaml
  responses:
    "204":
      description: OK
get:
  summary: 属性列表
  operationId: listMartAttributes
  x-role-permit: MART_ATTRIBUTE:R
  tags:
    - mart
  parameters:
    - $ref: ../components/parameters/limit.yaml
    - $ref: ../components/parameters/offset.yaml
    - $ref: ../components/parameters/filter.yaml
    - $ref: ../components/parameters/sort.yaml
    - $ref: ../components/parameters/include_deleted.yaml
    - $ref: ../components/parameters/no_total_count.yaml
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ListMartAttributesPageResponse.yaml
