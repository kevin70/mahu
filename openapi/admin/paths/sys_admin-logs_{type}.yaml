parameters:
  - in: path
    name: type
    description: 管理员日志类型
    required: true
    schema:
      $ref: "../components/schemas/AdminLogType.yaml"
get:
  summary: 管理员日志
  operationId: pageSysAdminLog
  x-permission-code: SYS_ADMIN_LOG:R
  tags: [h_admin]
  parameters:
    - $ref: "../components/parameters/page_size.yaml"
    - $ref: "../components/parameters/page.yaml"
    - name: admin_id
      in: query
      description: 管理员 ID（用于过滤日志）
      schema:
        type: integer
        format: int32
    - name: username
      in: query
      description: 登录名（仅对登录日志生效）
      schema:
        type: string
    - $ref: "../components/parameters/start_date.yaml"
    - $ref: "../components/parameters/end_date.yaml"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/SysAdminLogPageResponse.yaml"
