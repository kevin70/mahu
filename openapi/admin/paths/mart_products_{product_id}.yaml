parameters:
  - name: product_id
    in: path
    description: 产品 ID
    schema:
      type: integer
      format: int64
put:
  summary: 更新产品信息
  operationId: updateMartProduct
  x-role-permit: MART_PRODUCT:W
  tags:
    - mart
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/UpsertMartProductRequest.yaml
  responses:
    "204":
      description: OK
delete:
  summary: 删除产品
  operationId: deleteMartProduct
  x-role-permit: MART_PRODUCT:D
  tags:
    - mart
  responses:
    "204":
      description: OK
get:
  summary: 获取指定的产品
  operationId: getMartProduct
  x-role-permit: MART_PRODUCT:R
  tags:
    - mart
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/GetMartProductResponse.yaml
