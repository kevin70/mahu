post:
  summary: 新建管理员
  operationId: createSystemAdmin
  x-permission-code: SYSTEM_ADMIN:W
  tags: [ h-system-admin ]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/UpsertSystemAdminRequest.yaml"
  responses:
    "204":
      description: OK
get:
  summary: 管理员分页列表
  operationId: pageSystemAdmins
  x-permission-code: SYSTEM_ADMIN:R
  tags: [ h-system-admin ]
  parameters:
    - $ref: "../components/parameters/limit.yaml"
    - $ref: "../components/parameters/offset.yaml"
    - $ref: "../components/parameters/filter.yaml"
    - $ref: "../components/parameters/sort.yaml"
    - $ref: "../components/parameters/include_deleted.yaml"
    - $ref: "../components/parameters/no_total.yaml"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/PageAdminResponse.yaml"
