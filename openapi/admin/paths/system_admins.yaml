post:
  summary: 新建管理员
  operationId: createAdmin
  x-role-permit: ADMIN:W
  tags:
    - system
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/UpsertAdminRequest.yaml"
  responses:
    "204":
      description: OK
get:
  summary: 管理员列表
  operationId: listAdmins
  x-role-permit: ADMIN:R
  tags:
    - system
  parameters:
    - $ref: "../components/parameters/limit.yaml"
    - $ref: "../components/parameters/offset.yaml"
    - $ref: "../components/parameters/filter.yaml"
    - $ref: "../components/parameters/sort.yaml"
    - $ref: "../components/parameters/include_deleted.yaml"
    - $ref: "../components/parameters/no_total_count.yaml"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/AdminsPageResponse.yaml"
