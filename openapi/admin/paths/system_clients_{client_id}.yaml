parameters:
  - name: client_id
    in: path
    description: 客户端 ID
    schema:
      type: string
get:
  summary: 获取指定客户端
  operationId: getSystemClient
  x-permission-code: CLIENT:R
  tags: [ system ]
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/SystemClientResponse.yaml"
delete:
  summary: 删除客户端
  operationId: deleteSystemClient
  x-permission-code: CLIENT:W
  tags: [ system ]
  responses:
    "204":
      description: OK
put:
  summary: 修改客户端
  operationId: updateSystemClient
  x-permission-code: CLIENT:W
  tags: [ system ]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/UpsertSystemClientRequest.yaml"
  responses:
    "204":
      description: OK
