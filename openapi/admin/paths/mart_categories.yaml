post:
  summary: 新建分类
  operationId: createMartCategory
  x-role-permit: MART_CATEGORY:W
  tags:
    - mart
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/UpsertMartCategoryRequest.yaml"
  responses:
    "204":
      description: OK
get:
  summary: 分类列表
  operationId: listMartCategories
  x-role-permit: MART_CATEGORY:R
  tags:
    - mart
  parameters:
    - $ref: "../components/parameters/limit.yaml"
    - $ref: "../components/parameters/offset.yaml"
    - $ref: "../components/parameters/filter.yaml"
    - $ref: "../components/parameters/sort.yaml"
    - $ref: "../components/parameters/include_deleted.yaml"
    - $ref: "../components/parameters/no_total_count.yaml"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/MartCategoriesPageResponse.yaml"
