parameters:
  - name: admin_id
    in: path
    description: 管理员 ID
    required: true
    schema:
      type: integer
      format: int32
put:
  summary: 修改管理员
  operationId: updateSysAdmin
  x-permission-code: SYS_ADMIN:W
  tags: [h_admin]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/SysAdminUpsertRequest.yaml"
  responses:
    "204":
      description: OK
delete:
  summary: 删除管理员
  operationId: deleteSysAdmin
  x-permission-code: SYS_ADMIN:W
  tags: [h_admin]
  responses:
    "204":
      description: OK
get:
  summary: 获取指定管理员
  operationId: getSysAdmin
  x-permission-code: SYS_ADMIN:R
  tags: [h_admin]
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/SysAdminResponse.yaml"
