post:
  summary: 新增品牌
  operationId: createBrand
  x-role-permit: BRAND:W
  tags:
    - base
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/UpsertBrandRequest.yaml
  responses:
    "204":
      description: OK
get:
  summary: 品牌列表
  operationId: listBrands
  x-role-permit: BRAND:R
  tags:
    - base
  parameters:
    - $ref: ../components/parameters/limit.yaml
    - $ref: ../components/parameters/offset.yaml
    - $ref: ../components/parameters/filter.yaml
    - $ref: ../components/parameters/sort.yaml
    - $ref: ../components/parameters/include_deleted.yaml
    - $ref: ../components/parameters/no_total_count.yaml
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/BrandsPageResponse.yaml
