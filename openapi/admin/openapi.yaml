#file: noinspection YAMLSchemaValidation
openapi: 3.1.1
info:
  title: Mahu 后台接口文档
  version: 1.0.0
  description: |
    - `x-permission-code` 权限代码
servers:
  - url: http://127.0.0.1:9093
    description: 本地测试服务
components:
  securitySchemes:
    AT:
      type: http
      in: header
      scheme: Bearer
      description: 访问令牌
security:
  - AT: [ ]
tags:
  - name: base
    description: 基础模块
    x-displayName: 基础模块
  - name: me
    description: 当前认证用户
    x-displayName: 当前认证用户
  - name: system
    description: 系统模块
    x-displayName: 系统模块
  - name: h-system-admin
    x-displayName: 管理员管理
  - name: h-system-role
    x-displayName: 角色管理
  - name: log
    x-displayName: 业务日志
x-tagGroups:
  - name: 基础模块
    tags:
      - me
      - base
  - name: 系统模块
    tags:
      - h-system-admin
      - h-system-role
paths:
  /samples:
    $ref: "paths/samples.yaml"
  ### =============================== 公共数据接口 =============================== ###
  /info:
    $ref: "paths/info.yaml"
  /p/dicts:
    $ref: "paths/p_dicts.yaml"
  /p/dicts/{code}:
    $ref: "paths/p_dicts_{code}.yaml"

  ### =============================== 认证/用户数据接口 =============================== ###
  /login/token:
    $ref: "paths/login_token.yaml"
  /oauth2/token:
    $ref: "paths/oauth2_token.yaml"
  /me/profile:
    $ref: "paths/me_profile.yaml"
  /me/password:
    $ref: "paths/me_password.yaml"

  ### =============================== 帮助数据接口 =============================== ###
  /oss/presigned-upload:
    $ref: "paths/oss_presigned-upload.yaml"

  ### =============================== 系统模块接口 =============================== ###
  /system/admins:
    $ref: "paths/system_admins.yaml"
  /system/admins/{admin_id}:
    $ref: "paths/system_admins_{admin_id}.yaml"
  /system/roles:
    $ref: "paths/system_roles.yaml"
  /system/roles/{role_id}:
    $ref: "paths/system_roles_{role_id}.yaml"
  /system/dicts:
    $ref: "paths/system_dicts.yaml"
  /system/dicts/{type_code}:
    $ref: "paths/system_dicts_{type_code}.yaml"
  /system/clients:
    $ref: "paths/system_clients.yaml"
  /system/clients/{client_id}:
    $ref: "paths/system_clients_{client_id}.yaml"
  /system/permissions:
    $ref: "paths/system_permissions.yaml"
  # 定时任务
  /system/scheduled-tasks:
    $ref: "paths/system_scheduled-tasks.yaml"
  /system/scheduled-tasks/{task_id}/executions:
    $ref: "paths/system_scheduled-tasks_{task_id}_executions.yaml"

  ### =============================== 业务日志接口 =============================== ###
  /logs/admin-access:
    $ref: "paths/logs_admin_access.yaml"
  /logs/admin-audit:
    $ref: "paths/logs_admin_audit.yaml"
  /logs/admin-auth:
    $ref: "paths/logs_admin_auth.yaml"
