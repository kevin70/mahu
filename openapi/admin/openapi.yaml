#file: noinspection YAMLSchemaValidation
openapi: 3.0.3
info:
  title: Mahu 后台接口文档
  version: 1.0.0
  description:
    $ref: info_description.md
servers:
  - url: http://127.0.0.1:9093
    description: 本地测试服务
components:
  securitySchemes:
    AT:
      type: http
      scheme: Bearer
      description: 访问令牌
security:
  - AT: []
tags:
  - name: h-help
    x-displayName: 帮助接口
  - name: h-login
    x-displayName: 用户登录
  - name: h-me
    x-displayName: 认证用户
  - name: h-file
    x-displayName: 文件系统
  - name: h-public-dict
    x-displayName: 公共字典

  - name: h-auth-client
    x-displayName: 认证终端
  - name: h-dict
    x-displayName: 字典数据
  - name: h-permission
    x-displayName: 权限管理
  - name: h-role
    x-displayName: 角色管理
  - name: h-admin
    x-displayName: 管理员管理
  - name: h-scheduled-task
    x-displayName: 定时任务
  - name: log
    x-displayName: 业务日志
x-tagGroups:
  - name: 基础模块
    tags:
      - h-help
      - h-login
      - h-me
      - h-file
      - h-public-dict
  - name: 系统模块
    tags:
      - h-auth-client
      - h-dict
      - h-permission
      - h-role
      - h-admin
      - h-scheduled-task
paths:
  /samples:
    $ref: "paths/samples.yaml"
  ### =============================== 公共数据接口 =============================== ###
  /info:
    $ref: "paths/info.yaml"
  /p/dicts:
    $ref: "paths/p_dicts.yaml"
  /p/dicts/{dc}:
    $ref: "paths/p_dicts_{dc}.yaml"

  ### =============================== 认证/用户数据接口 =============================== ###
  /login/token:
    $ref: "paths/login_token.yaml"
  /me/profile:
    $ref: "paths/me_profile.yaml"
  /me/password:
    $ref: "paths/me_password.yaml"

  /files/presigned-upload:
    $ref: "paths/files_presigned-upload.yaml"
  ### =============================== 系统模块接口 =============================== ###
  /sys/auth-clients:
    $ref: "paths/sys_auth-clients.yaml"
  /sys/auth-clients/{client_id}:
    $ref: "paths/sys_auth-clients_{client_id}.yaml"
  /sys/dicts:
    $ref: "paths/sys_dicts.yaml"
  /sys/dicts/{dict_type_id}:
    $ref: "paths/sys_dicts_{dict_type_id}.yaml"
  /sys/permissions:
    $ref: "paths/sys_permissions.yaml"
  /sys/roles:
    $ref: "paths/sys_roles.yaml"
  /sys/roles/{role_id}:
    $ref: "paths/sys_roles_{role_id}.yaml"
  /sys/admins:
    $ref: "paths/sys_admins.yaml"
  /sys/admins/{admin_id}:
    $ref: "paths/sys_admins_{admin_id}.yaml"
  /sys/scheduled-tasks:
    $ref: "paths/sys_scheduled-tasks.yaml"
  /sys/scheduled-tasks/{task_name}/exes:
    $ref: "paths/sys_scheduled-tasks_{task_name}_exes.yaml"
  /sys/admin-logs/{type}:
    $ref: "paths/sys_admin-logs_{type}.yaml"
