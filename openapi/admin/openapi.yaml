#file: noinspection YAMLSchemaValidation
openapi: 3.0.3
info:
  title: Mahu 后台接口文档
  version: 1.0.0
  description:
    $ref: "info_description.md"
servers:
  - url: http://127.0.0.1:9093
    description: 本地测试服务
components:
  securitySchemes:
    AT:
      type: http
      scheme: Bearer
      description: 访问令牌
  parameters:
    ApiVersion:
      $ref: "components/parameters/api_version.yaml"
    RequestId:
      $ref: "components/parameters/request_id.yaml"
security:
  - AT: []
tags:
  - name: h_help
    x-displayName: 帮助接口
  - name: h_login
    x-displayName: 用户登录
  - name: h_me
    x-displayName: 认证用户
  - name: h_file
    x-displayName: OSS资源
  - name: h_id_photo
    x-displayName: 证件照
  - name: h_public_dict
    x-displayName: 公共字典
  - name: h_public_feature_flag
    x-displayName: 公共功能开关

  - name: h_auth_client
    x-displayName: 认证终端
  - name: h_dict
    x-displayName: 字典数据
  - name: h_permission
    x-displayName: 权限管理
  - name: h_role
    x-displayName: 角色管理
  - name: h_admin
    x-displayName: 管理员管理
  - name: h_feature_flag
    x-displayName: 功能开关
  - name: h_scheduled_task
    x-displayName: 定时任务
  - name: h_delayed_task
    x-displayName: 延时任务
x-tagGroups:
  - name: 基础模块
    tags:
      - h_help
      - h_login
      - h_me
      - h_public_dict
      - h_public_feature_flag
  - name: 系统模块
    tags:
      - h_file
      - h_id_photo
      - h_auth_client
      - h_dict
      - h_permission
      - h_role
      - h_admin
      - h_feature_flag
      - h_scheduled_task
      - h_delayed_task
paths:
  /samples:
    $ref: "paths/samples.yaml"
  ### =============================== 公共数据接口 =============================== ###
  /info:
    $ref: "paths/info.yaml"
  /p/dicts:
    $ref: "paths/p_dicts.yaml"
  /p/dicts/{dc}:
    $ref: "paths/p_dicts_{dc}.yaml"
  /p/feature-flags:
    $ref: "paths/p_feature-flags.yaml"

  ### =============================== 认证/用户数据接口 =============================== ###
  /login/token:
    $ref: "paths/login_token.yaml"
  /me/profile:
    $ref: "paths/me_profile.yaml"
  /me/password:
    $ref: "paths/me_password.yaml"
  /me/notifications:
    $ref: "paths/me_notifications.yaml"
  /me/notifications/poll:
    $ref: "paths/me_notifications_poll.yaml"
  /me/notifications/{notification_id}/read:
    $ref: "paths/me_notifications_{notification_id}_read.yaml"
  /me/notifications/read-batch:
    $ref: "paths/me_notifications_read-batch.yaml"

  /files:
    $ref: "paths/files.yaml"
  /files/{file_id}/forward:
    $ref: "paths/files_{file_id}_forward.yaml"
  /id-photos:
    $ref: "paths/id-photos.yaml"
  /id-photos/{id_photo_id}/forward:
    $ref: "paths/id-photos_{id_photo_id}_forward.yaml"
  ### =============================== 系统模块接口 =============================== ###
  /sys/auth-clients:
    $ref: "paths/sys_auth-clients.yaml"
  /sys/auth-clients/{client_id}:
    $ref: "paths/sys_auth-clients_{client_id}.yaml"
  /sys/dict-groups:
    $ref: "paths/sys_dict-groups.yaml"
  /sys/dict-groups/{group_id}:
    $ref: "paths/sys_dict-groups_{group_id}.yaml"
  /sys/permissions:
    $ref: "paths/sys_permissions.yaml"
  /sys/roles:
    $ref: "paths/sys_roles.yaml"
  /sys/roles/{role_id}:
    $ref: "paths/sys_roles_{role_id}.yaml"
  /sys/admins:
    $ref: "paths/sys_admins.yaml"
  /sys/admins/{admin_id}:
    $ref: "paths/sys_admins_{admin_id}.yaml"
  /sys/admin-logs/{type}:
    $ref: "paths/sys_admin-logs_{type}.yaml"
  /sys/feature-flags:
    $ref: "paths/sys_feature-flags.yaml"
  /sys/feature-flags/{feature_flag_id}:
    $ref: "paths/sys_feature-flags_{feature_flag_id}.yaml"
  /sys/scheduled-tasks:
    $ref: "paths/sys_scheduled-tasks.yaml"
  /sys/scheduled-tasks/{task_name}:
    $ref: "paths/sys_scheduled-tasks_{task_name}.yaml"
  /sys/scheduled-tasks/{task_name}/logs:
    $ref: "paths/sys_scheduled-tasks_{task_name}_logs.yaml"
  /sys/delayed-tasks:
    $ref: "paths/sys_delayed-tasks.yaml"
