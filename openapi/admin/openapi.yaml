openapi: 3.0.3
info:
  title: Mahu 后台接口文档
  version: 1.0.0
servers:
  - url: http://127.0.0.1:9093
    description: 本地测试服务
tags:
  - name: basis
    description: 基础模块
  - name: token
    description: 访问令牌
  - name: me
    description: 当前认证用户
  - name: system
    description: 系统模块
  - name: mart
    description: 商城模块
security:
  - BearerAuth: [ ]
paths:
  /hx801:
    $ref: paths/hx801.yaml

  ### =============================== 公共数据接口 =============================== ###
  /p/mart/categories:
    $ref: paths/p_mart_categories.yaml
  ### =============================== 公共数据接口 =============================== ###

  /login/token:
    $ref: paths/login_token.yaml
  /oauth2/token:
    $ref: paths/oauth2_token.yaml
  /me/profile:
    $ref: paths/me_profile.yaml
  /me/password:
    $ref: paths/me_password.yaml

  /system/employees:
    $ref: paths/system_employees.yaml
  /system/employees/{id}:
    $ref: paths/system_employees_{id}.yaml
  /system/departments:
    $ref: paths/system_departments.yaml
  /system/departments/{id}:
    $ref: paths/system_departments_{id}.yaml
  /system/roles:
    $ref: paths/system_roles.yaml
  /system/roles/{id}:
    $ref: paths/system_roles_{id}.yaml
  /system/dicts:
    $ref: paths/system_dicts.yaml
  /system/dicts/predefine-kinds:
    $ref: paths/system_dicts_predefine_kinds.yaml
  /system/dicts/{id}:
    $ref: paths/system_dicts_{id}.yaml

  /system/clients:
    $ref: paths/system_clients.yaml
  /system/clients/{client_id}:
    $ref: paths/system_clients_{client_id}.yaml

  /system/permits:
    $ref: paths/system_permits.yaml
  /system/access-logs:
    $ref: paths/system_access_logs.yaml
  /system/audit-jours:
    $ref: paths/system_audit_jours.yaml

  # 设置
  /settings/oss-direct-upload:
    $ref: paths/settings_oss_direct_upload.yaml

  # 品牌管理
  /brands:
    $ref: paths/brands.yaml
  /brands/{id}:
    $ref: paths/brands_{id}.yaml
  /shops:
    $ref: paths/shops.yaml
  /shops/{id}:
    $ref: paths/shops_{id}.yaml
  /shops/{shop_id}/assets:
    $ref: paths/shops_{shop_id}_assets.yaml
  /mart/categories:
    $ref: paths/mart_categories.yaml
  /mart/categories.tree:
    $ref: paths/mart_categories.tree.yaml
  /mart/attributes:
    $ref: paths/mart_attributes.yaml
  /mart/attributes/{id}:
    $ref: paths/mart_attributes_{id}.yaml
  /mart/attributes/{attribute_id}/values:
    $ref: paths/mart_attributes_{attribute_id}_values.yaml
  /mart/attributes/{attribute_id}/values/{attribute_value_id}:
    $ref: paths/mart_attributes_{attribute_id}_values_{attribute_value_id}.yaml
  /mart/products:
    $ref: paths/mart_products.yaml
  /mart/products/{product_id}:
    $ref: paths/mart_products_{product_id}.yaml
  /mart/products/{product_id}/status:
    $ref: paths/mart_products_{product_id}_status.yaml

  /samples:
    get:
      summary: 样例
      description: |
        HTTP 错误码响应 https://www.webfx.com/web-development/glossary/http-status-codes
      responses:
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: ./components/schemas/ErrorResponse.yaml
        403:
          description: 拒绝访问
          content:
            application/json:
              schema:
                $ref: ./components/schemas/ErrorResponse.yaml
        404:
          description: 未找到请求资源
          content:
            application/json:
              schema:
                $ref: ./components/schemas/ErrorResponse.yaml
        500:
          description: 服务器错误
          content:
            application/json:
              schema:
                $ref: ./components/schemas/ErrorResponse.yaml
components:
  securitySchemes:
    AT:
      type: apiKey
      in: query
      name: access_token
      description: 接口认证参数
    BearerAuth:
      type: http
      scheme: Bearer
      bearerFormat: JWT
