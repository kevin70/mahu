type: object
required:
  - name
  - version
  - env
  - server_time
  - build
  - java
properties:
  name:
    type: string
    description: 应用名称
  version:
    type: string
    description: 应用版本
  env:
    type: string
    description: 应用环境
  server_time:
    type: string
    description: 服务器时间
  build:
    type: object
    description: 应用构建信息
    required:
      - time
      - revision
    properties:
      time:
        type: string
        description: 应用构建时间
      revision:
        type: string
        description: Git 提交 Hash 值
  java:
    type: object
    description: 应用 Java 信息
    required:
      - version
      - vendor
    properties:
      version:
        type: string
        description: Java 版本
      vendor:
        type: string
        description: Java 提供商
  features:
    type: array
    description: 应用功能
    items:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: |
            名称唯一，命名规则为`模块.名称`
        description:
          type: string
          description: 功能描述
        enabled:
          type: boolean
          description: 功能是否启用
          default: false
