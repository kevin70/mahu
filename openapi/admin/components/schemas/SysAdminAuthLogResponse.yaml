type: object
description: 管理员认证记录
required:
  - id
  - created_at
  - admin_id
properties:
  id:
    type: string
    format: uuid
    description: 日志 ID
  created_at:
    type: string
    format: date-time
    description: 创建时间
  admin_id:
    type: integer
    format: int64
    description: 管理员 ID
  grant_type:
    type: string
    description: 认证类型
    enum:
      - PASSWORD
      - REFRESH_TOKEN
  client_id:
    type: string
    description: 认证客户端 ID
  ip_addr:
    type: string
    description: 访问 IP
  user_agent:
    type: string
    description: HTTP User-Agent
