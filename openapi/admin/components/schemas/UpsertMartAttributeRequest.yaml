type: object
required:
  - name
  - value_type
  - ordering
properties:
  name:
    type: string
    description: 名称
    maxLength: 32
  value_type:
    $ref: "./AttributeValueTypeEnum.yaml"
  remark:
    type: string
    description: 备注
    maxLength: 256
  ordering:
    type: integer
    format: int32
    description: 排序值
  searchable:
    type: boolean
    description: 是否为可搜索的
  required:
    type: boolean
    description: 是否为必选项
