type: object
description: 管理员登录尝试记录
required:
  - id
  - created_at
  - grant_type
  - success
properties:
  id:
    type: string
    format: uuid
    description: 日志 ID
  created_at:
    type: string
    format: date-time
    description: 创建时间
  admin_id:
    type: integer
    format: int64
    description: 命中的管理员 ID
  grant_type:
    type: string
    description: 授权类型
  client_id:
    type: string
    description: 认证客户端 ID
  username:
    type: string
    description: 登录名快照
  success:
    type: boolean
    description: 是否登录成功
  reason_code:
    type: string
    description: 失败原因码
  reason_detail:
    type: string
    description: 失败原因摘要
  ip_addr:
    type: string
    description: 访问 IP
  user_agent:
    type: string
    description: HTTP User-Agent
