type: object
required:
  - uid
  - nickname
  - avatar
properties:
  uid:
    type: integer
    format: int64
    description: 用户ID
  username:
    type: string
    description: 用户名
  nickname:
    type: string
    description: 昵称
  avatar:
    type: string
    description: 头像URL
  department:
    type: object
    properties:
      id:
        type: integer
        format: int32
        description: 部门 ID
      name:
        type: string
        description: 部门名称
  permits:
    description: 用户拥有的角色代码
    type: array
    items:
      type: string
