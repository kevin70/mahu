type: object
required:
  - name
  - description
  - status
properties:
  name:
    type: string
    description: 名称
  description:
    type: string
    description: 描述
  status:
    $ref: "./_status.yaml"
  effective_from:
    type: string
    format: date-time
    description: 生效开始时间（精确到秒）
  effective_to:
    type: string
    format: date-time
    description: 生效结束时间（精确到秒）
  start_time:
    type: string
    format: time
    description: 每天的开始时间（精确到秒）
  end_time:
    type: string
    format: time
    description: 每天的结束时间（精确到秒，结束时间小于开始时间代表跨天）
  weekdays:
    type: array
    description: 启用的星期
    items:
      type: integer
      format: int32
    maxItems: 7
  allow_users:
    type: array
    description: 可用的用户 IDs
    items:
      type: integer
      format: int64
  deny_users:
    type: array
    description: 禁用的用户 IDs
    items:
      type: integer
      format: int64
  extra_properties:
    type: object
    additionalProperties: true
    description: 扩展属性
  extra_schema:
    type: object
    additionalProperties: true
    description: JSON Schema
