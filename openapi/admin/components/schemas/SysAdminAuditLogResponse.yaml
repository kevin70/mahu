type: object
description: 管理员操作记录
required:
  - id
  - created_at
  - admin_id
  - ip_addr
  - table_name
  - change_type
  - data_id
  - data
properties:
  id:
    type: integer
    format: int64
    description: 日志 ID
  created_at:
    type: string
    format: date-time
    description: 创建时间
  admin_id:
    type: integer
    format: int64
    description: 管理员 ID
  ip_addr:
    type: string
    description: 访问 IP
  table_name:
    type: string
    description: 表名
  data_tenant_id:
    type: string
    description: 租户 ID
  change_type:
    type: string
    description: |
      修改类型
      - `I` 新增
      - `U` 修改
      - `D` 删除
  data_id:
    type: string
    description: 数据 ID
  data:
    type: string
    description: 新数据
  old_data:
    type: string
    description: 旧数据
