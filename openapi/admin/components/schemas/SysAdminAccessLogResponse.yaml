type: object
description: 管理员访问记录
required:
  - id
  - admin_id
  - ip_addr
properties:
  id:
    type: string
    format: uuid
    description: 日志 ID
  created_at:
    type: string
    format: date-time
    description: 创建时间
  admin_id:
    type: integer
    format: int64
    description: 管理员 ID
  ip_addr:
    type: string
    description: 访问 IP
  method:
    type: string
    description: 访问的 HTTP Method
  uri_path:
    type: string
    description: 访问的 HTTP 路径
  referer:
    type: string
    description: HTTP referer
  protocol:
    type: string
    description: 访问协议
  response_status:
    type: integer
    format: int32
    description: 响应状态
  response_bytes:
    type: integer
    format: int64
    description: 响应字节数
  user_agent:
    type: string
    description: 请求的 User Agent
