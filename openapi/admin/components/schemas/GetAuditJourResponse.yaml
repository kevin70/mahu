type: object
required:
  - id
  - create_time
  - source
  - user_id
  - ip_addr
  - table_name
  - change_type
  - data_id
  - data
properties:
  id:
    type: integer
    format: int64
    description: 数据 ID
  create_time:
    type: string
    format: date-time
    description: 创建时间
  source:
    type: string
    description: 来源
  user_id:
    type: integer
    format: int64
    description: 修改用户 ID
  ip_addr:
    type: string
    description: 访问 IP
  table_name:
    type: string
    description: 表名
  data_tenant_id:
    type: string
    description: 租户 ID
  change_type:
    type: string
    description: |
      修改类型
      - `I` 新增
      - `U` 修改
      - `D` 删除
  data_id:
    type: string
    description: 数据 ID
  data:
    type: string
    description: 修改内容
