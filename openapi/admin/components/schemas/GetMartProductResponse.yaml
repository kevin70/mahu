type: object
required:
  - id
  - name
  - images
  - status
  - type
properties:
  id:
    type: integer
    format: int64
    description: SPU
  create_time:
    type: string
    format: date-time
    description: 创建时间
  update_time:
    type: string
    format: date-time
    description: 修改时间
  deleted:
    type: boolean
    description: 软删除的
  name:
    type: string
    description: 名称
  description:
    type: string
    description: 描述
  images:
    type: array
    description: 轮播图片
    maxLength: 36
    items:
      type: string
  status:
    $ref: ./ProductStatusEnum.yaml
  type:
    $ref: ./ProductTypeEnum.yaml
  attributes:
    type: array
    description: 产品属性
    items:
      type: object
      required:
        - id
        - deleted
        - attribute_id
        - attribute_name
        - attribute_value_type
      properties:
        id:
          type: integer
          format: int32
          description: 产品属性 ID
        deleted:
          type: boolean
          description: 软删除的
        attribute_id:
          type: integer
          format: int32
          description: 属性 ID
        attribute_name:
          type: string
          description: 属性名称
        attribute_value_type:
          $ref: ./AttributeValueTypeEnum.yaml
        attribute_remark:
          type: string
          description: 属性备注
        value:
          type: string
          description: 属性值
  variants:
    type: array
    description: 产品变体
    items:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: SKU
        deleted:
          type: boolean
          description: 软删除的
        qn:
          type: string
          description: 限定名称
        cover:
          type: string
          description: 封面图片
        price:
          type: number
          format: double
          description: 价格
        length:
          type: integer
          format: int64
          description: 长度
        width:
          type: integer
          format: int64
          description: 宽度
        height:
          type: integer
          format: int64
          description: 高度
        weight:
          type: integer
          format: int64
          description: 重量
        status:
          $ref: ./ProductStatusEnum.yaml
