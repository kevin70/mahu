type: object
required:
  - type_code
  - name
  - status
properties:
  data_code:
    type: string
    description: 字典数据代码，唯一
    minLength: 1
    maxLength: 50
  name:
    type: string
    description: 字典数据名称
    minLength: 1
    maxLength: 100
  value:
    type: string
    description: 字典类型描述
    maxLength: 4096
  ordering:
    type: integer
    format: int32
    description: 排序值
  status:
    type: boolean
    description: 状态（F:禁用, T:启用）
