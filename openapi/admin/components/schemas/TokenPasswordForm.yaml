type: object
required:
  - grant_type
  - client_id
  - username
  - password
properties:
  grant_type:
    type: string
    description: 授权类型
    default: password
  client_id:
    type: string
    description: 请求客户端 ID
  username:
    type: string
    description: 登录用户名
  password:
    type: string
    description: 登录密码
