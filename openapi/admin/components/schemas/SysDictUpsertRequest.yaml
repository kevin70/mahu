type: object
required:
  - label
  - ordering
properties:
  dc:
    type: integer
    format: int32
    description: 字典代码
  label:
    type: string
    description: 字典数据标签
    minLength: 1
    maxLength: 255
  value:
    type: string
    description: 字典类型描述
    maxLength: 4096
  ordering:
    $ref: "./_ordering.yaml"
  enabled:
    type: boolean
    description: 是否启用
  preset:
    type: boolean
    description: 是否预置
