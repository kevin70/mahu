type: object
required:
  - label
  - ordering
  - disabled
properties:
  dc:
    type: integer
    format: int32
    description: 字典代码
  label:
    type: string
    description: 字典数据标签
    minLength: 1
    maxLength: 255
  value:
    type: string
    description: 字典类型描述
    maxLength: 4096
  ordering:
    type: integer
    format: int32
    description: 排序值
  disabled:
    type: boolean
    description: 状态（F:禁用, T:启用）
