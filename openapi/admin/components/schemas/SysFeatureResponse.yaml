type: object
required:
  - id
  - module
  - code
  - name
  - status
properties:
  id:
    type: integer
    format: int32
    description: 功能 ID
  created_at:
    type: string
    format: date-time
    description: 创建时间
  updated_at:
    type: string
    format: date-time
    description: 修改时间
  module:
    type: string
    description: 模块
  code:
    type: string
    description: 功能代码
  name:
    type: string
    description: 功能名称
  description:
    type: string
    description: 描述
  status:
    $ref: "./_status.yaml"
  effective_from:
    type: string
    format: date-time
    description: 生效开始时间（精确到秒）
  effective_to:
    type: string
    format: date-time
    description: 生效结束时间（精确到秒）
  start_time:
    type: string
    format: time
    description: 每天的开始时间（精确到秒）
  end_time:
    type: string
    format: time
    description: 每天的结束时间（精确到秒，结束时间小于开始时间代表跨天）
  weekdays:
    type: array
    items:
      type: integer
      format: int32
    description: 启用的星期
  metadata:
    type: string
    description: 扩展属性
  metadata_schema:
    type: string
    description: |
      `metadata` 元数据的 JSON Schema
