type: object
required:
  - dc
  - value
  - label
properties:
  dc:
    type: integer
    format: int32
    description: 字典数据代码，唯一
  value:
    type: string
    description: 字典类型描述
  label:
    type: string
    description: 字典数据标签
  color:
    type: string
    description: 展示用颜色（如 CSS 色值）
    maxLength: 64
  enabled:
    type: boolean
    description: 是否启用
  preset:
    type: boolean
    description: 是否预置
