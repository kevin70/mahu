type: object
required:
  - type
  - file_name
properties:
  type:
    type: integer
    format: int32
    minimum: 0
    description: 类型
  file_name:
    type: string
    description: 上传文件的名称
    minLength: 1
    maxLength: 128
  file_size:
    type: integer
    format: int64
    description: 文件大小
    minimum: 1
