type: object
required:
  - created_at
  - updated_at
  - id
  - name
properties:
  created_at:
    type: string
    format: date-time
    description: 创建时间
  updated_at:
    type: string
    format: date-time
    description: 修改时间
  id:
    type: integer
    format: int32
    description: 字典类型代码，唯一
  name:
    type: string
    description: 字典类型名称
  description:
    type: string
    description: 字典类型描述
  disabled:
    type: boolean
    description: 是否禁用
  data:
    type: array
    description: 字典数据
    items:
      type: object
      required:
        - created_at
        - updated_at
        - dc
        - name
        - ordering
      properties:
        created_at:
          type: string
          format: date-time
          description: 创建时间
        updated_at:
          type: string
          format: date-time
          description: 修改时间
        dc:
          type: integer
          format: int32
          description: 字典数据代码，唯一
        name:
          type: string
          description: 字典数据名称
          minLength: 1
          maxLength: 100
        value:
          type: string
          description: 字典类型描述
          maxLength: 4096
        ordering:
          type: integer
          format: int32
          description: 排序值
        disabled:
          type: boolean
          description: 是否禁用
