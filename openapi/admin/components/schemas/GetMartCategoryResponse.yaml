type: object
description: 分类
required:
  - id
  - name
properties:
  id:
    type: integer
    format: int32
    description: ID
  create_time:
    type: string
    format: date-time
    description: 创建时间
  update_time:
    type: string
    format: date-time
    description: 修改时间
  deleted:
    type: boolean
    description: 软删除的
  name:
    type: string
    description: 名称
  parent:
    type: object
    description: 父分类
    required:
      - id
      - name
    properties:
      id:
        type: integer
        format: int32
        description: 父类型 ID
      name:
        type: string
        description: 父分类名称
  ordering:
    type: integer
    format: int32
  remark:
    type: string
    description: 备注
