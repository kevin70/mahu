type: object
required:
  - created_at
  - updated_at
  - id
  - name
properties:
  created_at:
    type: string
    format: date-time
    description: 创建时间
  updated_at:
    type: string
    format: date-time
    description: 修改时间
  id:
    type: string
    description: 字典分组代码，唯一
  name:
    type: string
    description: 字典分组名称
  description:
    type: string
    description: 字典分组描述
  enabled:
    type: boolean
    description: 是否启用
  visibility:
    type: integer
    format: int32
    description: |
      可见性
      - 0: 私有的，仅限内部使用
      - 1: 公共的
      - 2: 受限的
  preset:
    type: boolean
    description: 是否预置
  data:
    type: array
    description: 字典数据
    items:
      type: object
      required:
        - created_at
        - updated_at
        - dc
        - label
        - ordering
      properties:
        created_at:
          type: string
          format: date-time
          description: 创建时间
        updated_at:
          type: string
          format: date-time
          description: 修改时间
        dc:
          type: integer
          format: int32
          description: 字典数据代码，唯一
        label:
          type: string
          description: 字典数据标签
          minLength: 1
          maxLength: 100
        value:
          type: string
          description: 字典分组描述
          maxLength: 4096
        ordering:
          $ref: "./_ordering.yaml"
        color:
          type: string
          description: 展示用颜色（如 CSS 色值）
          maxLength: 64
        enabled:
          type: boolean
          description: 是否启用
        preset:
          type: boolean
          description: 是否预置
