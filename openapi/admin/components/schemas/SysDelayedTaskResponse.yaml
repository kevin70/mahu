type: object
required:
  - id
  - reference_id
  - topic
  - status
  - delay_until
  - attempts
  - max_attempts
  - payload
properties:
  id:
    type: string
    format: uuid
    description: ID
  created_at:
    type: string
    format: date-time
    description: 创建时间
  updated_at:
    type: string
    format: date-time
    description: 修改时间
  reference_id:
    type: string
    description: 业务侧实体主键/关联 ID（必填）
  topic:
    type: string
    description: 主题
  status:
    $ref: "./_status.yaml"
  delay_until:
    type: string
    format: date-time
    description: 下一次可执行时间（含重试）
  attempts:
    type: integer
    format: int32
    description: 已尝试次数
  max_attempts:
    type: integer
    format: int32
    description: 最大重试次数（包括首次执行）
  lock_at:
    type: string
    format: date-time
    description: 任务锁定时间（开始执行时间）
  lease_seconds:
    type: integer
    format: int32
    description: 锁租约(秒)，worker 处理任务允许的最长时间
  payload:
    type: string
    description: 消息内容（JSON 字符串）
  idempotency_key:
    type: string
    description: 幂等键
