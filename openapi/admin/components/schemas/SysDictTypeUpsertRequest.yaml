type: object
required:
  - id
  - name
properties:
  id:
    type: string
    description: 字典类型代码，唯一
    minLength: 1
    maxLength: 50
  name:
    type: string
    description: 字典类型名称
    minLength: 1
    maxLength: 255
  description:
    type: string
    description: 字典类型描述
    maxLength: 4096
  enabled:
    type: boolean
    description: 是否启用
  visibility:
    type: integer
    format: int32
    description: |
      可见性
      - 0: 私有的，仅限内部使用
      - 1: 公共的
      - 2: 受限的
  value_regex:
    type: string
    description: 值正则表达式规则
  data:
    type: array
    description: 字典数据
    items:
      $ref: "./SysDictUpsertRequest.yaml"
