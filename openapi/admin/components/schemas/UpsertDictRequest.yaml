type: object
required:
  - type_code
  - name
properties:
  type_code:
    type: string
    description: 字典类型代码，唯一
    minLength: 1
    maxLength: 50
  name:
    type: string
    description: 字典类型名称
    minLength: 1
    maxLength: 50
  description:
    type: string
    description: 字典类型描述
    maxLength: 255
  disabled:
    type: boolean
    description: 是否禁用
  data:
    type: array
    description: 字典数据
    items:
      type: object
      required:
        - type_code
        - name
      properties:
        data_code:
          type: string
          description: 字典数据代码，唯一
          minLength: 1
          maxLength: 50
        name:
          type: string
          description: 字典数据名称
          minLength: 1
          maxLength: 100
        value:
          type: string
          description: 字典类型描述
          maxLength: 4096
        ordering:
          type: integer
          format: int32
          description: 排序值
        disabled:
          type: boolean
          description: 是否禁用
