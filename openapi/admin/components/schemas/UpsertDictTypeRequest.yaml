type: object
required:
  - type_code
  - name
  - status
properties:
  type_code:
    type: string
    description: 字典类型代码，唯一
    minLength: 1
    maxLength: 50
  name:
    type: string
    description: 字典类型名称
    minLength: 1
    maxLength: 50
  description:
    type: string
    description: 字典类型描述
    maxLength: 255
  status:
    type: boolean
    description: 状态（F:禁用, T:启用）
