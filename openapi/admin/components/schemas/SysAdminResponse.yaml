type: object
required:
  - id
  - username
  - nickname
properties:
  id:
    type: integer
    format: int32
    description: ID
  created_at:
    type: string
    format: date-time
    description: 创建时间
  updated_at:
    type: string
    format: date-time
    description: 修改时间
  deleted:
    type: boolean
    description: 是否已经删除的数据
  username:
    type: string
    description: 用户名
  nickname:
    type: string
    description: 昵称
  avatar:
    type: string
    description: 头像地址
  status:
    type: integer
    format: int32
    description: |
      状态
      - `200` 活跃
      - `720` 已禁用
  role_ids:
    type: array
    description: 角色 IDs
    items:
      type: integer
      format: int32
