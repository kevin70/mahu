name: include_total
in: query
description: |
  返回总记录数量

  示例:
  - `GET /tickets?include_total=1` - 分页返回总记录数
  - `GET /tickets` - 分页返回总记录数
  - `GET /tickets?include_total=n` - 不返回总记录数
schema:
  type: string
  default: y
  enum:
    - "1"
    - "true"
    - "false"
    - "yes"
    - "on"
    - "y"
    - "n"
