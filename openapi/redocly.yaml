# See https://redocly.com/docs/cli/configuration/
# See https://redocly.com/docs/redoc/config
extends:
  - recommended
plugins:
  - plugins/local.js

# See https://redocly.com/docs/cli/rules
rules:
  info-license: off
  paths-kebab-case: error
  no-unused-components: error
  path-not-include-query: error
  required-string-property-missing-min-length: off
  operation-singular-tag: warn
  operation-tag-defined: error
  operation-operationId: error
  no-ambiguous-paths: error
  operation-4xx-response: off
  tag-description: off
  request-mime-type:
    severity: error
    allowedValues:
      - application/json
  response-mime-type:
    severity: error
    allowedValues:
      - application/json
  rule/operationId-casing:
    subject:
      type: Operation
      property: operationId
    assertions:
      casing: camelCase
  rule/parameter-casing:
    subject:
      type: Parameter
    assertions:
      casing: snake_case
  rule/schema-properties-casing:
    subject:
      type: Schema
      property: properties
    assertions:
      casing: snake_case
  rule/operation-id-check:
    subject:
      type: Operation
      property: operationId
    message: |
      `operationId` 前缀检查
    assertions:
      local/checkWordsStarts:
        words:
          - create
          - upsert
          - update
          - merge
          - delete
          - approve
          - reject
          - get
          - retrieve
          - list
          - page
          - cancel
          - execute
          - login

openapi:
  showExtensions: true
  sortRequiredPropsFirst: true
  schemasExpansionLevel: all

### 构建文档的命令参考
### redocly build-docs admin@v1 --theme.openapi.sideNavStyle=path-only
apis:
  admin@v1:
    root: "./admin/openapi.yaml"
