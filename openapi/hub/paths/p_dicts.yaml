get:
  summary: 字典类型列表
  operationId: listPublicDict
  tags: [ h_public_dict ]
  security: [ ]
  parameters:
    - in: query
      name: type_id
      description: 字典类型 ID
      schema:
        type: array
        items:
          type: string
    - in: query
      name: include_data
      description: 是否包涵 `data` 数据
      schema:
        type: boolean
        default: false
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: array
            description: 字典列表
            items:
              $ref: "../components/schemas/PublicDictTypeResponse.yaml"
