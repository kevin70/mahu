type: object
required:
  - id
  - module
  - code
  - name
properties:
  id:
    type: integer
    format: int32
    description: 功能 ID
  enabled:
    type: boolean
    description: 功能当前可用
    default: false
  module:
    type: string
    description: 功能模块
  code:
    type: string
    description: 功能代码
  name:
    type: string
    description: 名称
  description:
    type: string
    description: 描述
  effective_from:
    type: string
    format: date-time
    description: 生效开始时间（精确到秒）
  effective_to:
    type: string
    format: date-time
    description: 生效结束时间（精确到秒）
  start_time:
    type: string
    format: time
    description: 每天的开始时间（精确到秒）
  end_time:
    type: string
    format: time
    description: 每天的结束时间（精确到秒，结束时间小于开始时间代表跨天）
  weekdays:
    type: array
    description: 启用的星期
    items:
      type: integer
      format: int32
  metadata:
    type: object
    description: 功能元数据
    additionalProperties: true
