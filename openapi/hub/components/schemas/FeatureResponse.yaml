type: object
required:
  - id
  - module
  - code
  - name
properties:
  id:
    type: integer
    format: int32
    description: 功能 ID
  active:
    type: boolean
    description: 当前功能是否正在活跃
    default: false
  module:
    type: string
    description: 功能模块
  code:
    type: string
    description: 功能代码
  name:
    type: string
    description: 功能名称
  description:
    type: string
    description: 功能描述
  effective_from:
    type: string
    format: date-time
    description: 生效开始时间（精确到秒）
  effective_to:
    type: string
    format: date-time
    description: 生效结束时间（精确到秒）
  start_time:
    type: string
    format: time
    description: 每天的开始时间（精确到秒）
  end_time:
    type: string
    format: time
    description: 每天的结束时间（精确到秒，结束时间小于开始时间代表跨天）
  weekdays:
    type: array
    description: 启用的星期
    items:
      type: integer
      format: int32
  extra_properties:
    type: object
    description: 扩展属性
    additionalProperties: true
