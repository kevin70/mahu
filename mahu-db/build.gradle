buildscript {
    dependencies {
        classpath("io.helidon.config:helidon-config-yaml:$helidonVersion")
        classpath("io.hypersistence:hypersistence-tsid:$hypersistenceTsidVersion")
    }
}

plugins {
    id "java-library"
    id "org.liquibase.gradle" version "2.2.1"
}

// TIPS:
// Gradle 回滚数据库版本命令：gradle rollbackCount -PliquibaseCommandValue=1

//noinspection UnnecessaryQualifiedReference
def config = io.helidon.config.Config.builder()
    .addSource(io.helidon.config.ConfigSources.file("C:/houge/mahu.yaml").optional())
    .build()

liquibase {
    jvmArgs = ["-Dliquibase.searchPath=${projectDir}/src/main/resources"]
    activities.register("main") {
        // 配置属性参考文档：https://docs.liquibase.com/concepts/connections/creating-config-properties.html
        changelogFile "db/changelog/changelog-root.yaml"
//        url config.get("db.url").asString().orElse(System.getenv("MAHU_DB_URL"))
        url "jdbc:postgresql://106.14.192.224:5432/mahu4"
//        url "jdbc:postgresql://106.14.192.224:5432/mahu-prod"
        username config.get("db.username").asString().orElse(System.getenv("MAHU_DB_USERNAME"))
        password config.get("db.password").asString().orElse(System.getenv("MAHU_DB_PASSWORD"))
    }
}

tasks.register("randomNextVersion") {
    doLast {
        println("versions:")
        println("==========================================================")
        for (n in 1..10) {
            //noinspection UnnecessaryQualifiedReference
            println(io.hypersistence.tsid.TSID.fast())
        }
        println("==========================================================")
    }
}

dependencies {
    liquibaseRuntime("org.liquibase:liquibase-core:4.26.0")
    liquibaseRuntime("org.liquibase:liquibase-groovy-dsl:3.0.3")
    liquibaseRuntime("info.picocli:picocli:4.7.5")
    liquibaseRuntime("org.postgresql:postgresql:$postgresqlVersion")

    api("org.liquibase:liquibase-core:4.26.0")
    api("info.picocli:picocli:4.7.5")
    implementation("org.postgresql:postgresql:$postgresqlVersion")
}
